<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Map-matching de GPS — caminhões</title>
<style>/*__LEAFLET_CSS__*/</style>
<style>
  body { font-family: system-ui, sans-serif; margin: 0; }
  header { padding: 12px 16px; background: #143d59; color: #fff; }
  #status { padding: 8px 16px; color: #333; }
</style>
</head>
<body>
<header><strong>Map-matching de GPS</strong> — caminhões</header>
<div id="status">Carregando malha…</div>
<section style="padding: 12px 16px;">
  <label>Motor:
    <select id="engine">
      <option value="js" selected>JavaScript (offline)</option>
      <option value="duckdb">DuckDB-WASM (requer internet)</option>
    </select>
  </label>
  <div id="drop" style="margin-top:8px;border:2px dashed #999;border-radius:8px;padding:24px;text-align:center;cursor:pointer;">
    Arraste arquivos .csv/.xlsx aqui ou clique para selecionar
    <input id="file" type="file" accept=".csv,.xlsx" multiple hidden />
  </div>
  <ul id="files"></ul>
  <div id="map" style="height:480px;margin-top:12px;border:1px solid #ccc;"></div>
  <table id="summary" border="1" cellspacing="0" cellpadding="4" style="margin-top:12px;border-collapse:collapse;width:100%;"></table>
  <div id="downloads" style="margin-top:12px;"></div>
</section>
<script>/*__APP_JS__*/</script>
</body>
</html>
