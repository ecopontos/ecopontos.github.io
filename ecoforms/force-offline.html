<!DOCTYPE html>
<html>
<head>
    <title>Forçar Modo Offline</title>
</head>
<body>
    <h1>Forçar Modo Offline</h1>
    <div id="output"></div>
    <button onclick="forceOfflineMode()">Forçar Modo Offline</button>
    <button onclick="checkCurrentConfig()">Verificar Configuração Atual</button>

    <script src="js/system-config.js"></script>
    <script>
        const output = document.getElementById('output');

        function log(message) {
            output.innerHTML += '<p>' + message + '</p>';
            console.log(message);
        }

        function checkCurrentConfig() {
            output.innerHTML = '';
            log('🔧 Verificando configuração atual...');

            if (window.systemConfig) {
                const preferredSource = window.systemConfig.getFormSourcePreference();
                log('📋 preferredSource atual: ' + preferredSource);

                if (preferredSource === 'local_only') {
                    log('✅ Sistema já está configurado para modo offline');
                } else {
                    log('⚠️ Sistema NÃO está em modo offline (atual: ' + preferredSource + ')');
                }
            } else {
                log('❌ systemConfig não carregado');
            }
        }

        function forceOfflineMode() {
            output.innerHTML = '';
            log('🔧 Forçando modo offline...');

            if (window.systemConfig) {
                window.systemConfig.setFormSourcePreference('local_only');
                log('✅ Configuração alterada para local_only');

                // Verificar se foi salva
                const newPreference = window.systemConfig.getFormSourcePreference();
                log('📋 Nova configuração: ' + newPreference);

                if (newPreference === 'local_only') {
                    log('✅ Modo offline ativado com sucesso!');
                    log('🔄 Recarregue a página principal para aplicar as mudanças');
                } else {
                    log('❌ Falha ao salvar configuração');
                }
            } else {
                log('❌ systemConfig não carregado - tentando salvar diretamente no localStorage');

                // Fallback: salvar diretamente no localStorage
                try {
                    const config = localStorage.getItem('ecoforms_system_config');
                    let parsed = {};
                    if (config) {
                        parsed = JSON.parse(config);
                    }

                    if (!parsed.forms) parsed.forms = {};
                    parsed.forms.preferredSource = 'local_only';

                    localStorage.setItem('ecoforms_system_config', JSON.stringify(parsed));
                    log('✅ Configuração salva diretamente no localStorage');
                } catch (e) {
                    log('❌ Erro ao salvar configuração: ' + e.message);
                }
            }
        }

        // Verificar configuração ao carregar
        setTimeout(checkCurrentConfig, 500);
    </script>
</body>
</html>
