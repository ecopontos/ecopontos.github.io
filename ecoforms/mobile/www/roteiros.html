<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roteiros — EcoForms</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        [x-cloak] { display: none !important; }
        .badge { @apply inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-xs font-semibold; }
        .card  { @apply bg-white rounded-xl shadow-sm border border-gray-200 p-4 mb-3 transition-all hover:shadow-md; }
        .progress-bar { @apply h-1.5 rounded-full bg-gray-200 overflow-hidden; }
        .progress-fill { @apply h-full rounded-full transition-all; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

<div x-data="roteirosApp()" x-init="init()" class="max-w-2xl mx-auto px-4 py-6">

    <!-- Cabeçalho -->
    <div class="flex items-center justify-between mb-5">
        <div class="flex items-center gap-3">
            <a href="index.html" class="text-gray-400 hover:text-gray-600">
                <i class="fas fa-arrow-left text-lg"></i>
            </a>
            <div>
                <h1 class="text-xl font-bold text-gray-900">Roteiros</h1>
                <p class="text-xs text-gray-500" x-text="resumo"></p>
            </div>
        </div>
        <button @click="carregar()" class="p-2 text-blue-600 hover:bg-blue-50 rounded-lg">
            <i class="fas fa-sync-alt" :class="carregando && 'fa-spin'"></i>
        </button>
    </div>

    <!-- Filtros -->
    <div class="flex gap-2 mb-5 overflow-x-auto pb-1">
        <template x-for="f in filtros" :key="f.valor">
            <button @click="filtroAtivo = f.valor; aplicarFiltro()"
                    class="flex-none px-3 py-1.5 rounded-full text-sm font-medium transition-colors"
                    :class="filtroAtivo === f.valor
                        ? 'bg-blue-600 text-white'
                        : 'bg-white text-gray-600 border border-gray-300 hover:bg-gray-50'">
                <span x-text="f.label"></span>
                <span x-show="f.valor !== 'todos'" class="ml-1 opacity-75"
                      x-text="'(' + contar(f.valor) + ')'"></span>
            </button>
        </template>
    </div>

    <!-- Lista -->
    <div x-show="!carregando && roteiros.length > 0">
        <template x-for="r in roteiros" :key="r.id">
            <div class="card" @click="abrirColetas(r.id)">
                <div class="flex items-start justify-between gap-2 mb-2">
                    <div class="flex-1 min-w-0">
                        <p class="font-semibold text-gray-900 truncate"
                           x-text="r.nome || 'Roteiro #' + r.id.slice(-6)"></p>
                        <p class="text-xs text-gray-500 mt-0.5"
                           x-text="formatarData(r.data) + (r.descricao ? ' · ' + r.descricao : '')"></p>
                    </div>
                    <span class="badge flex-none" :class="corStatus(r.status)"
                          x-text="labelStatus(r.status)"></span>
                </div>

                <!-- Progresso -->
                <div class="mt-3" x-show="r.pontos_total > 0">
                    <div class="flex justify-between text-xs text-gray-500 mb-1">
                        <span x-text="r.pontos_visitados + '/' + r.pontos_total + ' pontos'"></span>
                        <span x-text="Math.round((r.pontos_visitados || 0) / r.pontos_total * 100) + '%'"></span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill"
                             :class="(r.pontos_visitados || 0) >= r.pontos_total ? 'bg-green-500' : 'bg-blue-500'"
                             :style="'width: ' + Math.round((r.pontos_visitados || 0) / r.pontos_total * 100) + '%'"></div>
                    </div>
                </div>

                <div class="flex flex-wrap gap-x-4 gap-y-1 text-xs text-gray-500 mt-3 pt-2 border-t border-gray-100">
                    <span x-show="r.setor_id" class="flex items-center gap-1">
                        <i class="fas fa-building text-gray-400"></i>
                        <span x-text="r.setor_id"></span>
                    </span>
                    <span x-show="r.usuario_id" class="flex items-center gap-1">
                        <i class="fas fa-user text-gray-400"></i>
                        <span x-text="r.usuario_id === currentUser?.id ? 'Você' : r.usuario_id"></span>
                    </span>
                </div>
            </div>
        </template>
    </div>

    <!-- Empty -->
    <div x-show="!carregando && roteiros.length === 0"
         class="flex flex-col items-center justify-center py-16 text-center">
        <i class="fas fa-route text-5xl text-gray-300 mb-4"></i>
        <p class="text-gray-500 font-medium">Nenhum roteiro encontrado</p>
        <p class="text-sm text-gray-400 mt-1" x-show="filtroAtivo !== 'todos'">
            Tente o filtro "Todos"
        </p>
    </div>

    <!-- Loading -->
    <div x-show="carregando" class="flex justify-center py-16">
        <i class="fas fa-spinner fa-spin text-3xl text-blue-400"></i>
    </div>

    <!-- Toast -->
    <div x-show="toast.visivel" x-cloak x-transition
         class="fixed bottom-6 left-1/2 -translate-x-1/2 px-5 py-3 rounded-xl text-white text-sm font-medium shadow-lg z-50"
         :class="toast.tipo === 'ok' ? 'bg-green-600' : 'bg-red-600'"
         x-text="toast.msg"></div>

</div>

<script type="module">
import { openSyncEventDB } from './js/sync/SyncEventDB.js';

function lerUsuario() {
    try { return JSON.parse(localStorage.getItem('currentUser') || 'null'); } catch { return null; }
}

async function lerTabela(db, tabela) {
    return new Promise((resolve, reject) => {
        const tx = db.transaction(tabela, 'readonly');
        const store = tx.objectStore(tabela);
        const req = store.getAll();
        req.onsuccess = () => resolve(req.result || []);
        req.onerror  = () => reject(req.error);
    });
}

window.roteirosApp = function () {
    return {
        roteiros: [],
        todas: [],
        carregando: false,
        filtroAtivo: 'todos',
        currentUser: lerUsuario(),
        toast: { visivel: false, msg: '', tipo: 'ok' },

        filtros: [
            { valor: 'todos',     label: 'Todos'      },
            { valor: 'planejado', label: 'Planejados'  },
            { valor: 'em_rota',   label: 'Em rota'    },
            { valor: 'concluido', label: 'Concluídos'  },
        ],

        get resumo() {
            const hoje = new Date().toISOString().slice(0, 10);
            const hojeRoteiros = this.todas.filter(r => (r.data || '').startsWith(hoje));
            return hojeRoteiros.length > 0 ? `${hojeRoteiros.length} roteiro(s) hoje` : `${this.todas.length} no total`;
        },

        async init() {
            await this.carregar();
        },

        async carregar() {
            this.carregando = true;
            try {
                const db = await openSyncEventDB();
                const rows = await lerTabela(db, 'tbl_roteiros');
                this.todas = rows.sort((a, b) =>
                    new Date(b.data || b.criado_em || 0) - new Date(a.data || a.criado_em || 0)
                );
                this.aplicarFiltro();
            } catch (e) {
                console.error('[Roteiros] Erro:', e);
                this.mostrarToast('Erro ao carregar roteiros', 'erro');
            } finally {
                this.carregando = false;
            }
        },

        aplicarFiltro() {
            if (this.filtroAtivo === 'todos') {
                this.roteiros = [...this.todas];
            } else {
                this.roteiros = this.todas.filter(r => r.status === this.filtroAtivo);
            }
        },

        contar(status) {
            return this.todas.filter(r => r.status === status).length;
        },

        abrirColetas(id) {
            window.location.href = `coletas.html?roteiro=${encodeURIComponent(id)}`;
        },

        corStatus(s) {
            return {
                planejado: 'bg-yellow-100 text-yellow-800',
                em_rota:   'bg-blue-100 text-blue-700',
                concluido: 'bg-green-100 text-green-800',
            }[s] ?? 'bg-gray-100 text-gray-600';
        },

        labelStatus(s) {
            return {
                planejado: 'Planejado',
                em_rota:   'Em rota',
                concluido: 'Concluído',
            }[s] ?? s ?? '—';
        },

        formatarData(iso) {
            if (!iso) return '—';
            return new Date(iso).toLocaleDateString('pt-BR', {
                day: '2-digit', month: '2-digit', year: '2-digit',
            });
        },

        mostrarToast(msg, tipo = 'ok') {
            this.toast = { visivel: true, msg, tipo };
            setTimeout(() => { this.toast.visivel = false; }, 3000);
        },
    };
};
</script>
</body>
</html>
