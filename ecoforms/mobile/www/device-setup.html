<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoSuite - Configuração Inicial</title>
    <link href="css/design-system.css" rel="stylesheet">
    <!-- Mobile Touch Improvements -->
    <link href="css/mobile-touch-improvements.css" rel="stylesheet" media="(max-width: 768px)">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .setup-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            padding: 40px;
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        .logo {
            font-size: 32px;
            color: #4CAF50;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
            background: #f8f9fa;
        }

        .form-control:focus {
            outline: none;
            border-color: #4CAF50;
            background: white;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .btn-primary {
            background: #4CAF50;
            color: white;
        }

        .btn-primary:hover {
            background: #45a049;
            transform: translateY(-2px);
        }

        .alert {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            text-align: center;
        }

        .alert-error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }

        .alert-success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4CAF50;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hidden {
            display: none;
        }

        .progress-container {
            margin-top: 20px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e1e5e9;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            height: 100%;
            background: #4CAF50;
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress-text {
            font-size: 14px;
            color: #666;
        }

        .form-selector {
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #e1e5e9;
            border-radius: 8px;
            padding: 10px;
            background: #f8f9fa;
        }

        .form-checkbox {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        .form-checkbox input {
            margin-right: 10px;
        }

        .form-checkbox label {
            margin: 0;
            font-weight: normal;
        }

        /* Estilos para status de carregamento */
        .status-item {
            display: flex;
            align-items: center;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            background: #f8f9fa;
            border-left: 4px solid #6c757d;
        }

        .status-item.loading {
            border-left-color: #ffc107;
            background: #fff3cd;
        }

        .status-item.success {
            border-left-color: #28a745;
            background: #d4edda;
        }

        .status-item.error {
            border-left-color: #dc3545;
            background: #f8d7da;
        }

        .status-icon {
            margin-right: 12px;
            font-size: 18px;
        }

        .status-content {
            flex: 1;
        }

        .status-title {
            font-weight: 600;
            margin-bottom: 2px;
        }

        .status-description {
            font-size: 14px;
            color: #666;
        }

        .mini-progress {
            width: 100%;
            height: 4px;
            background: #e1e5e9;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 8px;
        }

        .mini-progress-fill {
            height: 100%;
            background: #4CAF50;
            width: 0%;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="setup-container">
        <!-- Área de Alerta para Erros Críticos -->
        <div id="alert-container"></div>

        <!-- Área de Status de Carregamento (Processo Automático) -->
        <div id="loading-status">
            <div style="text-align: center; margin-bottom: 25px;">
                <img src="logo-pmf.png" alt="PMF" style="width: 80px; height: auto; margin-bottom: 12px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));">
                <div class="logo" style="font-size: 2.2rem; letter-spacing: -0.5px; margin-bottom: 4px;">Eco<span style="font-weight: 800; color: #006A6A;">Suite</span></div>
                <div class="subtitle" style="font-weight: 500; color: #666;">Configuração Automática</div>
                <p style="font-size: 0.9rem; color: #888; margin-top: 5px;">Preparando ambiente para uso offline</p>
            </div>

            <div id="status-container" style="max-height: 380px; overflow-y: auto; padding-right: 5px; margin-bottom: 10px;">
                <!-- Status preenchido dinamicamente -->
            </div>

            <div class="progress-section" style="margin-top: 20px; background: rgba(0, 106, 106, 0.05); padding: 20px; border-radius: 16px; border: 1px solid rgba(0, 106, 106, 0.1);">
                <div class="progress-bar" style="height: 10px; background: #e0e0e0; border-radius: 5px; overflow: hidden;">
                    <div class="progress-fill" id="overall-progress" style="height: 100%; background: linear-gradient(90deg, #006A6A, #4CAF50); border-radius: 5px; width: 0%; transition: width 0.4s ease;"></div>
                </div>
                <div class="progress-text" id="overall-status" style="margin-top: 12px; font-weight: 600; color: #006A6A; text-align: left;">Inicializando...</div>
            </div>

            <button type="button" class="btn btn-secondary" id="retry-btn" style="display: none; margin-top: 25px; width: 100%; border-radius: 12px;" onclick="window.deviceSetup && window.deviceSetup.retrySetup ? window.deviceSetup.retrySetup() : window.location.reload()">
                🔄 Tentar Novamente
            </button>
        </div>

        <!-- Placeholder oculto -->
        <form id="setup-form" class="hidden"></form>
    </div>

    <!-- Scripts -->
    <script src="js/system-config.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/utils/stable-stringify.js"></script>
    <script src="js/uuidv7.js"></script>
    <script src="js/data-service.js"></script>
    <script src="supabase-config.js"></script>
    <script src="js/supabase-client.js"></script>
    <!-- Sistema de pré-carregamento inteligente -->
    <script src="js/smart-preloader.js"></script>
    <script src="js/device-setup.js"></script>
</body>
</html>
