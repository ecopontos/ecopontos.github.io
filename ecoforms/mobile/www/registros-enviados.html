<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log de Registros Enviados</title>
    <!-- Universal Mobile-Desktop CSS System -->
    <link href="css/design-system.css" rel="stylesheet">
    <!-- Tailwind CSS Utilities -->
    <link href="css/tailwind.css" rel="stylesheet">
    <!-- Mobile Header Enhancements -->
    <link href="css/mobile-header-improvements.css" rel="stylesheet">
    <!-- Compact Header (Facebook-style) -->
    <link href="css/components/compact-header.css" rel="stylesheet">

    <!-- Backup Tailwind CDN (as local build is purged and might miss classes used here) -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .json-viewer {
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 0.375rem;
            padding: 1rem;
            font-family: 'Courier New', monospace;
            font-size: 0.875rem;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 400px;
            overflow-y: auto;
        }

        .status-badge {
            font-size: 0.75rem;
            padding: 0.25rem 0.5rem;
            border-radius: 9999px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-pending {
            background-color: #fef3c7;
            color: #92400e;
        }

        .status-synced {
            background-color: #d1fae5;
            color: #065f46;
        }

        .status-error {
            background-color: #fee2e2;
            color: #991b1b;
        }

        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-hover {
            transition: all 0.3s ease;
        }

        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .loading-spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            border-top: 4px solid #3b82f6;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen">
    <!-- Compact Header (Facebook-style) -->
    <div class="mobile-form-header compact">
        <div class="compact-header-row">
            <!-- Back Button -->
            <button onclick="window.location.href='index.html'" class="compact-btn back-btn" title="Voltar ao início">
                ⬅
            </button>

            <!-- Title -->
            <div class="compact-title-container">
                <h1 class="compact-title">Log de Registros</h1>
            </div>

            <!-- Right Actions -->
            <div class="compact-actions">
                <span class="compact-user-name" id="header-user-name">Carregando...</span>
                <div class="compact-status-dot" id="header-status-dot" title="Status"></div>
            </div>
        </div>
    </div>

    <div class="container mx-auto px-4 py-8">
        <!-- Header antigo removido -->

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6 mb-8">
            <div class="bg-white rounded-lg shadow p-6 card-hover">
                <div class="flex items-center">
                    <div class="p-3 rounded-full bg-blue-100 text-blue-600 mr-4">
                        <i class="fas fa-file-alt text-xl"></i>
                    </div>
                    <div>
                        <p class="text-sm text-gray-500">Total de Registros</p>
                        <p class="text-2xl font-bold text-gray-800" id="total-records">0</p>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow p-6 card-hover">
                <div class="flex items-center">
                    <div class="p-3 rounded-full bg-yellow-100 text-yellow-600 mr-4">
                        <i class="fas fa-clock text-xl"></i>
                    </div>
                    <div>
                        <p class="text-sm text-gray-500">Pendentes</p>
                        <p class="text-2xl font-bold text-gray-800" id="pending-records">0</p>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow p-6 card-hover">
                <div class="flex items-center">
                    <div class="p-3 rounded-full bg-green-100 text-green-600 mr-4">
                        <i class="fas fa-check-circle text-xl"></i>
                    </div>
                    <div>
                        <p class="text-sm text-gray-500">Sincronizados</p>
                        <p class="text-2xl font-bold text-gray-800" id="synced-records">0</p>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow p-6 card-hover">
                <div class="flex items-center">
                    <div class="p-3 rounded-full bg-red-100 text-red-600 mr-4">
                        <i class="fas fa-exclamation-triangle text-xl"></i>
                    </div>
                    <div>
                        <p class="text-sm text-gray-500">Com Erro</p>
                        <p class="text-2xl font-bold text-gray-800" id="error-records">0</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow mb-6">
            <div class="px-6 py-4 border-b border-gray-200">
                <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between">
                    <h2 class="text-lg font-semibold text-gray-800 mb-2 sm:mb-0">
                        <i class="fas fa-filter mr-2"></i>
                        Filtros e Ações
                    </h2>
                    <div class="flex flex-wrap gap-2">
                        <button id="refresh-btn"
                            class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition-colors">
                            <i class="fas fa-sync-alt mr-2"></i>
                            Atualizar
                        </button>
                        <button id="sync-pending-btn"
                            class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700 transition-colors">
                            <i class="fas fa-cloud-upload-alt mr-2"></i>
                            Sincronizar Pendentes
                        </button>
                        <button id="cleanup-btn"
                            class="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700 transition-colors">
                            <i class="fas fa-trash-alt mr-2"></i>
                            Limpar Sincronizados
                        </button>
                    </div>
                </div>
                <div class="mt-4 flex flex-col sm:flex-row gap-4">
                    <div class="flex-1">
                        <label for="status-filter" class="block text-sm font-medium text-gray-700 mb-1">Filtrar por
                            Status</label>
                        <select id="status-filter"
                            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="">Todos</option>
                            <option value="pending">Pendentes</option>
                            <option value="synced">Sincronizados</option>
                            <option value="error">Com Erro</option>
                        </select>
                    </div>
                    <div class="flex-1">
                        <label for="form-filter" class="block text-sm font-medium text-gray-700 mb-1">Filtrar por
                            Formulário</label>
                        <select id="form-filter"
                            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="">Todos</option>
                        </select>
                    </div>
                    <div class="flex-1">
                        <label for="search-input" class="block text-sm font-medium text-gray-700 mb-1">Pesquisar</label>
                        <input type="text" id="search-input" placeholder="Buscar nos dados..."
                            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>
            </div>
        </div>

        <div id="loading-container" class="flex justify-center items-center py-12 hidden">
            <div class="loading-spinner"></div>
        </div>

        <div id="records-container" class="space-y-4">
            <!-- Os registros serão inseridos aqui dinamicamente -->
        </div>

        <div id="empty-state" class="bg-white rounded-lg shadow p-8 text-center hidden">
            <i class="fas fa-inbox text-6xl text-gray-300 mb-4"></i>
            <h3 class="text-xl font-semibold text-gray-700 mb-2">Nenhum registro encontrado</h3>
            <p class="text-gray-500">Não há dados armazenados no banco de dados ou nenhum registro corresponde aos filtros
                aplicados.</p>
        </div>
    </div>

    <!-- Modal para visualização detalhada -->
    <div id="detail-modal" class="fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full z-50 hidden">
        <div class="relative top-20 mx-auto p-5 border w-11/12 md:w-3/4 lg:w-1/2 shadow-lg rounded-lg bg-white">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold text-gray-900">Detalhes do Registro</h3>
                <button id="close-modal" class="text-gray-400 hover:text-gray-600">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <div id="modal-content" class="space-y-4">
                <!-- Conteúdo do modal será inserido aqui -->
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/utils/stable-stringify.js"></script>
    <script src="js/uuidv7.js"></script>
    <script src="js/data-service.js"></script>
    <script>
        class SentRecordsLog {
            constructor() {
                this.dataService = window.dataService;
                this.records = [];
                this.filteredRecords = [];
                this.init();
            }

            async init() {
                await this.dataService.init();
                this.setupEventListeners();
                await this.loadRecords();
                this.updateStats();
                this.renderRecords();
            }

            setupEventListeners() {
                document.getElementById('refresh-btn').addEventListener('click', () => this.refresh());
                document.getElementById('sync-pending-btn').addEventListener('click', () => this.syncPending());
                document.getElementById('cleanup-btn').addEventListener('click', () => this.cleanupSynced());
                document.getElementById('status-filter').addEventListener('change', () => this.applyFilters());
                document.getElementById('form-filter').addEventListener('change', () => this.applyFilters());
                document.getElementById('search-input').addEventListener('input', () => this.applyFilters());
                document.getElementById('close-modal').addEventListener('click', () => this.closeModal());

                // Fechar modal ao clicar fora
                document.getElementById('detail-modal').addEventListener('click', (e) => {
                    if (e.target.id === 'detail-modal') {
                        this.closeModal();
                    }
                });
            }

            async loadRecords() {
                this.showLoading(true);
                try {
                    this.records = await this.dataService.getAllFormData();
                    this.filteredRecords = [...this.records];
                    this.updateFormFilter();
                } catch (error) {
                    console.error('Erro ao carregar registros:', error);
                    this.showNotification('Erro ao carregar registros: ' + error.message, 'error');
                } finally {
                    this.showLoading(false);
                }
            }

            updateStats() {
                const stats = {
                    total: this.records.length,
                    pending: this.records.filter(r => r.syncStatus === 'pending').length,
                    synced: this.records.filter(r => r.syncStatus === 'synced').length,
                    error: this.records.filter(r => r.syncStatus === 'error').length
                };

                document.getElementById('total-records').textContent = stats.total;
                document.getElementById('pending-records').textContent = stats.pending;
                document.getElementById('synced-records').textContent = stats.synced;
                document.getElementById('error-records').textContent = stats.error;
            }

            updateFormFilter() {
                const formTypes = [...new Set(this.records.map(r => r.tipoForm || r.formId || 'unknown'))];
                const formFilter = document.getElementById('form-filter');

                // Limpar opções existentes (exceto a primeira)
                while (formFilter.children.length > 1) {
                    formFilter.removeChild(formFilter.lastChild);
                }

                // Adicionar novas opções
                formTypes.forEach(type => {
                    const option = document.createElement('option');
                    option.value = type;
                    option.textContent = type;
                    formFilter.appendChild(option);
                });
            }

            applyFilters() {
                const statusFilter = document.getElementById('status-filter').value;
                const formFilter = document.getElementById('form-filter').value;
                const searchTerm = document.getElementById('search-input').value.toLowerCase();

                this.filteredRecords = this.records.filter(record => {
                    // Filtro por status
                    if (statusFilter && record.syncStatus !== statusFilter) {
                        return false;
                    }

                    // Filtro por formulário
                    const formType = record.tipoForm || record.formId || 'unknown';
                    if (formFilter && formType !== formFilter) {
                        return false;
                    }

                    // Filtro por termo de busca
                    if (searchTerm) {
                        const recordString = JSON.stringify(record).toLowerCase();
                        if (!recordString.includes(searchTerm)) {
                            return false;
                        }
                    }

                    return true;
                });

                this.renderRecords();
            }

            renderRecords() {
                const container = document.getElementById('records-container');
                const emptyState = document.getElementById('empty-state');

                if (this.filteredRecords.length === 0) {
                    container.innerHTML = '';
                    emptyState.classList.remove('hidden');
                    return;
                }

                emptyState.classList.add('hidden');
                container.innerHTML = '';

                this.filteredRecords.forEach(record => {
                    const recordCard = this.createRecordCard(record);
                    container.appendChild(recordCard);
                });
            }

            createRecordCard(record) {
                const card = document.createElement('div');
                card.className = 'bg-white rounded-lg shadow p-6 card-hover fade-in';

                const formType = record.tipoForm || record.formId || 'unknown';
                const createdAt = new Date(record.createdAt).toLocaleString('pt-BR');
                const statusClass = `status-${record.syncStatus}`;

                card.innerHTML = `
                    <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between">
                        <div class="flex-1">
                            <div class="flex items-center mb-2">
                                <h3 class="text-lg font-semibold text-gray-800 mr-3">${formType}</h3>
                                <span class="status-badge ${statusClass}">${record.syncStatus}</span>
                            </div>
                            <p class="text-sm text-gray-600 mb-2">
                                <i class="fas fa-calendar-alt mr-1"></i>
                                ${createdAt}
                            </p>
                            <p class="text-sm text-gray-600 mb-2">
                                <i class="fas fa-hashtag mr-1"></i>
                                ID: ${record.id}
                            </p>
                            <div class="text-sm text-gray-700">
                                <p class="font-medium mb-1">Resumo dos dados:</p>
                                <div class="json-viewer">${this.getRecordSummary(record)}</div>
                            </div>
                        </div>
                        <div class="flex flex-col sm:flex-row gap-2 mt-4 lg:mt-0 lg:ml-4">
                            <button class="view-btn px-3 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition-colors" data-id="${record.id}">
                                <i class="fas fa-eye mr-1"></i>
                                Ver Detalhes
                            </button>
                            ${record.syncStatus === 'pending' ? `
                                <button class="sync-btn px-3 py-2 bg-green-600 text-white rounded hover:bg-green-700 transition-colors" data-id="${record.id}">
                                    <i class="fas fa-cloud-upload-alt mr-1"></i>
                                    Sincronizar
                                </button>
                            ` : ''}
                            <button class="delete-btn px-3 py-2 bg-red-600 text-white rounded hover:bg-red-700 transition-colors" data-id="${record.id}">
                                <i class="fas fa-trash mr-1"></i>
                                Excluir
                            </button>
                        </div>
                    </div>
                `;

                // Adicionar event listeners
                card.querySelector('.view-btn').addEventListener('click', () => this.viewRecord(record.id));
                if (card.querySelector('.sync-btn')) {
                    card.querySelector('.sync-btn').addEventListener('click', () => this.syncRecord(record.id));
                }
                card.querySelector('.delete-btn').addEventListener('click', () => this.deleteRecord(record.id));

                return card;
            }

            getRecordSummary(record) {
                const summary = { ...record };
                // Remover campos de controle para melhor visualização
                delete summary.id;
                delete summary.syncStatus;
                delete summary.createdAt;
                delete summary.updatedAt;
                delete summary.userId;
                delete summary.tipoForm;

                return JSON.stringify(summary, null, 2).substring(0, 300) + '...';
            }

            async viewRecord(id) {
                const record = this.records.find(r => r.id === id);
                if (!record) return;

                const modal = document.getElementById('detail-modal');
                const modalContent = document.getElementById('modal-content');

                const formType = record.tipoForm || record.formId || 'unknown';
                const createdAt = new Date(record.createdAt).toLocaleString('pt-BR');
                const updatedAt = new Date(record.updatedAt).toLocaleString('pt-BR');

                modalContent.innerHTML = `
                    <div class="space-y-4">
                        <div>
                            <h4 class="font-semibold text-gray-700">Informações Gerais</h4>
                            <div class="mt-2 grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <div>
                                    <p class="text-sm text-gray-500">ID</p>
                                    <p class="font-medium">${record.id}</p>
                                </div>
                                <div>
                                    <p class="text-sm text-gray-500">Tipo de Formulário</p>
                                    <p class="font-medium">${formType}</p>
                                </div>
                                <div>
                                    <p class="text-sm text-gray-500">Status</p>
                                    <span class="status-badge status-${record.syncStatus}">${record.syncStatus}</span>
                                </div>
                                <div>
                                    <p class="text-sm text-gray-500">ID do Usuário</p>
                                    <p class="font-medium">${record.userId}</p>
                                </div>
                                <div>
                                    <p class="text-sm text-gray-500">Criado em</p>
                                    <p class="font-medium">${createdAt}</p>
                                </div>
                                <div>
                                    <p class="text-sm text-gray-500">Atualizado em</p>
                                    <p class="font-medium">${updatedAt}</p>
                                </div>
                            </div>
                        </div>
                        
                        <div>
                            <h4 class="font-semibold text-gray-700">Dados do Formulário</h4>
                            <div class="mt-2 json-viewer">${JSON.stringify(this.dataService.extractFormData(record), null, 2)}</div>
                        </div>
                        
                        <div class="flex justify-end space-x-2 pt-4 border-t">
                            ${record.syncStatus === 'pending' ? `
                                <button class="sync-single-btn px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700 transition-colors" data-id="${record.id}">
                                    <i class="fas fa-cloud-upload-alt mr-2"></i>
                                    Sincronizar
                                </button>
                            ` : ''}
                            <button class="delete-single-btn px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700 transition-colors" data-id="${record.id}">
                                <i class="fas fa-trash mr-2"></i>
                                Excluir
                            </button>
                            <button class="close-modal-btn px-4 py-2 bg-gray-600 text-white rounded hover:bg-gray-700 transition-colors">
                                <i class="fas fa-times mr-2"></i>
                                Fechar
                            </button>
                        </div>
                    </div>
                `;

                // Adicionar event listeners do modal
                const syncBtn = modalContent.querySelector('.sync-single-btn');
                if (syncBtn) {
                    syncBtn.addEventListener('click', async () => {
                        await this.syncRecord(record.id);
                        this.closeModal();
                    });
                }

                modalContent.querySelector('.delete-single-btn').addEventListener('click', async () => {
                    await this.deleteRecord(record.id);
                    this.closeModal();
                });

                modalContent.querySelector('.close-modal-btn').addEventListener('click', () => this.closeModal());

                modal.classList.remove('hidden');
            }

            closeModal() {
                document.getElementById('detail-modal').classList.add('hidden');
            }

            async syncRecord(id) {
                try {
                    this.showLoading(true);
                    await this.dataService.syncSingleRecord(id);
                    this.showNotification('Registro sincronizado com sucesso!', 'success');
                    await this.refresh();
                } catch (error) {
                    console.error('Erro ao sincronizar registro:', error);
                    this.showNotification('Erro ao sincronizar registro: ' + error.message, 'error');
                } finally {
                    this.showLoading(false);
                }
            }

            async deleteRecord(id) {
                if (!confirm('Tem certeza que deseja excluir este registro? Esta ação não pode ser desfeita.')) {
                    return;
                }

                try {
                    this.showLoading(true);
                    await this.dataService.deleteRecord(id);
                    this.showNotification('Registro excluído com sucesso!', 'success');
                    await this.refresh();
                } catch (error) {
                    console.error('Erro ao excluir registro:', error);
                    this.showNotification('Erro ao excluir registro: ' + error.message, 'error');
                } finally {
                    this.showLoading(false);
                }
            }

            async syncPending() {
                try {
                    this.showLoading(true);
                    const result = await this.dataService.syncPendingData();

                    if (result.success) {
                        this.showNotification(
                            `Sincronização concluída: ${result.synced} registros sincronizados, ${result.errors} erros.`,
                            result.errors > 0 ? 'warning' : 'success'
                        );
                    } else {
                        this.showNotification('Erro na sincronização: ' + result.message, 'error');
                    }

                    await this.refresh();
                } catch (error) {
                    console.error('Erro ao sincronizar registros pendentes:', error);
                    this.showNotification('Erro ao sincronizar registros: ' + error.message, 'error');
                } finally {
                    this.showLoading(false);
                }
            }

            async cleanupSynced() {
                const syncedCount = this.records.filter(r => r.syncStatus === 'synced').length;

                if (syncedCount === 0) {
                    this.showNotification('Não há registros sincronizados para limpar.', 'info');
                    return;
                }

                if (!confirm(`Tem certeza que deseja excluir ${syncedCount} registros sincronizados? Esta ação não pode ser desfeita.`)) {
                    return;
                }

                try {
                    this.showLoading(true);
                    const deletedCount = await this.dataService.cleanupSyncedData();
                    this.showNotification(`${deletedCount} registros sincronizados foram excluídos.`, 'success');
                    await this.refresh();
                } catch (error) {
                    console.error('Erro ao limpar registros sincronizados:', error);
                    this.showNotification('Erro ao limpar registros: ' + error.message, 'error');
                } finally {
                    this.showLoading(false);
                }
            }

            async refresh() {
                await this.loadRecords();
                this.updateStats();
                this.applyFilters();
            }

            showLoading(show) {
                const loadingContainer = document.getElementById('loading-container');
                const recordsContainer = document.getElementById('records-container');

                if (show) {
                    loadingContainer.classList.remove('hidden');
                    recordsContainer.classList.add('hidden');
                } else {
                    loadingContainer.classList.add('hidden');
                    recordsContainer.classList.remove('hidden');
                }
            }

            showNotification(message, type = 'info') {
                // Criar elemento de notificação
                const notification = document.createElement('div');
                notification.className = `fixed top-4 right-4 p-4 rounded-lg shadow-lg z-50 fade-in max-w-sm`;

                // Definir cores com base no tipo
                const colors = {
                    success: 'bg-green-500 text-white',
                    error: 'bg-red-500 text-white',
                    warning: 'bg-yellow-500 text-white',
                    info: 'bg-blue-500 text-white'
                };

                notification.className += ` ${colors[type] || colors.info}`;

                // Definir ícone com base no tipo
                const icons = {
                    success: 'fa-check-circle',
                    error: 'fa-exclamation-circle',
                    warning: 'fa-exclamation-triangle',
                    info: 'fa-info-circle'
                };

                notification.innerHTML = `
                    <div class="flex items-center">
                        <i class="fas ${icons[type] || icons.info} mr-3 text-xl"></i>
                        <p class="flex-1">${message}</p>
                        <button class="ml-3 text-white hover:text-gray-200" onclick="this.parentElement.parentElement.remove()">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                `;

                document.body.appendChild(notification);

                // Remover automaticamente após 5 segundos
                setTimeout(() => {
                    if (notification.parentElement) {
                        notification.remove();
                    }
                }, 5000);
            }
        }

        // Inicializar o log quando a página carregar
        document.addEventListener('DOMContentLoaded', () => {
            new SentRecordsLog();

            // Lógica do Header Compacto
            const updateHeader = () => {
                // Atualizar Status Online/Offline
                const statusDot = document.getElementById('header-status-dot');
                const updateStatus = () => {
                    if (navigator.onLine) {
                        statusDot.classList.add('online');
                        statusDot.classList.remove('offline');
                        statusDot.title = 'Online';
                    } else {
                        statusDot.classList.add('offline');
                        statusDot.classList.remove('online');
                        statusDot.title = 'Offline';
                    }
                };
                window.addEventListener('online', updateStatus);
                window.addEventListener('offline', updateStatus);
                updateStatus();

                // Atualizar Nome do Usuário
                try {
                    const sessionData = localStorage.getItem('ecoforms_auth_session');
                    if (sessionData) {
                        const session = JSON.parse(sessionData);
                        if (session.user && session.user.nome) {
                            document.getElementById('header-user-name').textContent = session.user.nome;
                            return;
                        }
                    }
                } catch (e) {
                    console.warn('Erro ao ler sessão:', e);
                }
                document.getElementById('header-user-name').textContent = 'Visitante';
            };

            updateHeader();
        });
    </script>
</body>

</html>
