    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            padding: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 28px;
            color: #4CAF50;
            margin-bottom: 10px;

        .actions-bar {

        .search-box {
            display: flex;
            align-items: center;
            gap: 10px;

        .search-box input {
            padding: 8px 12px;
            border: 1px solid #ddd;

            font-size: 14px;
            min-width: 200px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: #4CAF50;
            color: white;
        }

        .btn-primary:hover {
            background: #45a049;
        }

        .btn-secondary {
            background: #2196F3;
            color: white;
        }

        .btn-secondary:hover {
            background: #1976D2;
        }

        .btn-danger {
            background: #f44336;

        .forms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));

        .form-card {
            border: 1px solid #e0e0e0;

            padding: 20px;

            cursor: pointer;

        }

            border-color: #4CAF50;
            background: #f1f8e9;
        }

        .form-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }

        .form-meta {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }

        .form-actions {
            display: flex;
            gap: 8px;
            margin-top: 15px;
        }

        .editor-section {
            margin-top: 30px;
            border-top: 1px solid #e0e0e0;
            padding-top: 30px;
        }

        .editor-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .json-editor {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;

            resize: vertical;
            background: #f8f8f8;
        }

        .json-editor.error {
            border-color: #dc3545;
            background-color: #fff5f5;
        }

        .json-editor.valid {
            border-color: #28a745;
            background-color: #f0fff4;
        }

        .editor-tabs {
            display: flex;
            margin-bottom: 10px;
            border-bottom: 1px solid #ddd;
        }

        .editor-tab {
            padding: 10px 20px;
            background: #f8f9fa;
            border: none;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .editor-tab.active {
            background: white;
            border-bottom-color: #007bff;
            color: #007bff;
        }

        .editor-tab:hover {
            background: #e9ecef;
        }

        .ai-editor-tab {
            display: none;
            min-height: 600px;
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            background: white;
        }

        .ai-editor-tab.active {
            display: block;
        }

        .field-builder {
            background: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .field-builder h4 {
            margin-top: 0;
            color: #495057;
        }

        .form-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .form-group {
            flex: 1;
            min-width: 200px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #495057;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .checkbox-group input[type="checkbox"] {
            width: auto;
        }

        .fields-list {
            border: 1px solid #ddd;
            border-radius: 4px;
            max-height: 300px;
            overflow-y: auto;
        }

        .field-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            border-bottom: 1px solid #eee;
            background: white;
        }

        .field-item:last-child {
            border-bottom: none;
        }

        .field-item:hover {
            background: #f8f9fa;
        }

        .field-info {
            flex: 1;
        }

        .field-name {
            font-weight: 500;
            color: #495057;
        }

        .field-type {
            font-size: 12px;
            color: #6c757d;
            margin-top: 2px;
        }

        .field-actions {
            display: flex;
            gap: 5px;
        }

        .btn-small {
            padding: 4px 8px;
            font-size: 12px;
            border-radius: 3px;
        }

        .validation-message {
            margin-top: 10px;
            padding: 10px;
            border-radius: 4px;
            font-size: 14px;
        }

        .validation-message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .validation-message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .preview-section {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            background: #f9f9f9;
        }

        .preview-title {
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
        }

        .field-preview {
            margin-bottom: 15px;
            padding: 10px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            background: white;
        }

        .field-label {
            font-weight: bold;
            color: #555;
            margin-bottom: 5px;
        }

        .field-info {
            font-size: 12px;
            color: #888;
        }

        .editor-actions {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .status-message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }

        .status-success {
            background: #e8f5e8;
            color: #2e7d32;
            border: 1px solid #4caf50;
        }

        .status-error {
            background: #ffebee;
            color: #c62828;
            border: 1px solid #f44336;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4CAF50;
            border-radius: 50%;

            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #2196F3;
            text-decoration: none;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .editor-container {
                grid-template-columns: 1fr;
            }

            .actions-bar {
                flex-direction: column;
                align-items: stretch;
            }

            .forms-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">📋 EcoSuite</div>
            <div class="subtitle">Editor de Formulários</div>
        </div>

        <a href="index.html" class="back-link">← Voltar ao Início</a>

        <!-- Actions Bar -->
        <div class="actions-bar">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Buscar formulários..." onkeyup="filterForms()">
                <span>🔍</span>
            </div>
            <div>
                <button class="btn btn-primary" onclick="refreshForms()">🔄 Atualizar Lista</button>
                <button class="btn btn-secondary" onclick="createNewForm()">➕ Novo Formulário</button>
            </div>
        </div>

        <!-- Forms List -->
        <div id="formsList" class="forms-grid">
            <div class="loading">
                <div class="spinner"></div>
                Carregando formulários...
            </div>
        </div>

        <!-- Editor Section -->
        <div id="editorSection" class="editor-section" style="display: none;">
            <h3 id="editingTitle">Editando: <span id="currentFormName"></span></h3>

            <div class="editor-container">
                <!-- JSON Editor -->
                <div>
                    <div class="editor-tabs">
                        <button class="editor-tab active" onclick="switchTab('json')">Editor JSON</button>
                        <button class="editor-tab" onclick="switchTab('ai')">🤖 IA Form Builder</button>
                    </div>

                    <div id="jsonEditorTab" class="editor-tab-content active">
                        <h4>📝 Editor JSON</h4>
                        <textarea id="jsonEditor" class="json-editor" placeholder="Cole ou digite o JSON do formulário aqui..."></textarea>
                        <div id="jsonValidation" class="validation-message" style="display: none;"></div>
                    </div>

                    <div id="aiEditorTab" class="ai-editor-tab">
                        <iframe id="aiChatFrame" src="ai-form-builder.html" style="width: 100%; height: 600px; border: none; border-radius: 8px;"></iframe>
                    </div>
                </div>
                </div>

                <!-- Preview -->
                <div class="preview-section">
                    <h4>👁️ Pré-visualização</h4>
                    <div id="formPreview">
                        <p class="field-info">Selecione um formulário para ver a pré-visualização</p>
                    </div>
                </div>
            </div>

            <!-- Editor Actions -->
            <div class="editor-actions">
                <button class="btn btn-danger" onclick="deleteForm()">🗑️ Excluir</button>
                <button class="btn btn-secondary" onclick="downloadForm()">📥 Baixar</button>
                <button class="btn btn-primary" onclick="saveForm()">💾 Salvar</button>
            </div>

            <!-- Status Messages -->
            <div id="statusMessage" class="status-message"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/supabase.js"></script>
    <script src="js/smart-cache.js"></script>

    <script>
        let currentForm = null;
        let availableForms = [];
        let supabaseClient = null;
        let currentFormData = null;
        let activeTab = 'json';

        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                // Initialize Supabase
                const supabaseUrl = document.querySelector('meta[name="supabase-url"]').content;
                const supabaseKey = document.querySelector('meta[name="supabase-key"]').content;
                supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

                // Initialize SmartCache
                if (window.smartCache) {
                    console.log('SmartCache initialized');
                }

                // Setup JSON editor validation
                setupJsonValidation();

                // Setup message listener for AI iframe
                window.addEventListener('message', handleAIMessage);

                // Load forms
                await loadForms();
            } catch (error) {
                console.error('Initialization error:', error);
                showStatus('Erro ao inicializar: ' + error.message, 'error');
            }
        });

        // Setup JSON validation
        function setupJsonValidation() {
            const jsonEditor = document.getElementById('jsonEditor');
            jsonEditor.addEventListener('input', validateJson);
        }

        // Validate JSON in real-time
        function validateJson() {
            const jsonEditor = document.getElementById('jsonEditor');
            const validation = document.getElementById('jsonValidation');
            const jsonText = jsonEditor.value.trim();

            if (!jsonText) {
                jsonEditor.className = 'json-editor';
                validation.style.display = 'none';
                return;
            }

            try {
                const parsed = JSON.parse(jsonText);
                jsonEditor.className = 'json-editor valid';
                validation.className = 'validation-message success';
                validation.textContent = '✓ JSON válido';
                validation.style.display = 'block';

                // Update current form data
                currentFormData = parsed;

                // Update visual editor if active
                if (activeTab === 'visual') {
                    updateVisualEditor();
                }

                return true;
            } catch (error) {
                jsonEditor.className = 'json-editor error';
                validation.className = 'validation-message error';
                validation.textContent = '✗ Erro no JSON: ' + error.message;
                validation.style.display = 'block';
                return false;
            }
        }

        // Switch between tabs
        function switchTab(tab) {
            activeTab = tab;

            // Update tab buttons
            document.querySelectorAll('.editor-tab').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            // Update tab content
            if (tab === 'json') {
                document.getElementById('jsonEditorTab').style.display = 'block';
                document.getElementById('aiEditorTab').style.display = 'none';
            } else if (tab === 'ai') {
                document.getElementById('jsonEditorTab').style.display = 'none';
                document.getElementById('aiEditorTab').style.display = 'block';
            }
        }

        // Handle messages from AI iframe
        function handleAIMessage(event) {
            if (event.data && event.data.type === 'AI_FORM_GENERATED') {
                const formData = event.data.formData;

                // Switch to JSON tab to show the generated form
                switchTab('json');

                // Set the JSON in the editor
                document.getElementById('jsonEditor').value = JSON.stringify(formData, null, 2);

                // Validate and update preview
                validateJson();
                generatePreview(formData);

                showStatus('Formulário gerado pela IA! Clique em "Salvar" para persistir.', 'success');
            }
        }

        // Global function for AI iframe to call
        window.useAIForm = function(formData) {
            handleAIMessage({ data: { type: 'AI_FORM_GENERATED', formData: formData } });
        };

        // Handle field type change
        function handleFieldTypeChange() {
            const fieldType = document.getElementById('fieldType').value;
            const optionsDiv = document.getElementById('fieldOptions');
            
            if (fieldType === 'select' || fieldType === 'radio') {
                optionsDiv.style.display = 'block';
            } else {
                optionsDiv.style.display = 'none';
            }
        }

        // Add field to form
        function addField() {
            const fieldId = document.getElementById('fieldId').value.trim();
            const fieldLabel = document.getElementById('fieldLabel').value.trim();
            const fieldType = document.getElementById('fieldType').value;
            const fieldPlaceholder = document.getElementById('fieldPlaceholder').value.trim();
            const fieldRequired = document.getElementById('fieldRequired').checked;
            const fieldOptionsText = document.getElementById('fieldOptionsText').value.trim();

            if (!fieldId || !fieldLabel) {
                showStatus('ID e Rótulo são obrigatórios', 'error');
                return;
            }

            if (!currentFormData) {
                showStatus('Carregue um formulário primeiro', 'error');
                return;
            }

            // Check if field already exists
            if (currentFormData.campos && currentFormData.campos.some(campo => campo.id === fieldId)) {
                showStatus('Campo com este ID já existe', 'error');
                return;
            }

            // Create field object
            const newField = {
                id: fieldId,
                label: fieldLabel,
                type: fieldType,
                required: fieldRequired
            };

            if (fieldPlaceholder) {
                newField.placeholder = fieldPlaceholder;
            }

            // Add options for select/radio fields
            if ((fieldType === 'select' || fieldType === 'radio') && fieldOptionsText) {
                newField.options = fieldOptionsText.split('\n').map(opt => opt.trim()).filter(opt => opt);
            }

            // Add field to form
            if (!currentFormData.campos) {
                currentFormData.campos = [];
            }
            currentFormData.campos.push(newField);

            // Update JSON editor
            document.getElementById('jsonEditor').value = JSON.stringify(currentFormData, null, 2);
            validateJson();

            // Update visual editor
            updateVisualEditor();

            // Clear form
            clearFieldForm();

            showStatus('Campo adicionado com sucesso!', 'success');
        }

        // Clear field form
        function clearFieldForm() {
            document.getElementById('fieldId').value = '';
            document.getElementById('fieldLabel').value = '';
            document.getElementById('fieldType').value = 'text';
            document.getElementById('fieldPlaceholder').value = '';
            document.getElementById('fieldRequired').checked = false;
            document.getElementById('fieldOptionsText').value = '';
            document.getElementById('fieldOptions').style.display = 'none';
        }

        // Update visual editor with current form data
        function updateVisualEditor() {
            const fieldsList = document.getElementById('visualFieldsList');
            
            if (!currentFormData || !currentFormData.campos || currentFormData.campos.length === 0) {
                fieldsList.innerHTML = '<div style="padding: 20px; text-align: center; color: #6c757d;">Nenhum campo encontrado</div>';
                return;
            }

            let html = '';
            currentFormData.campos.forEach((campo, index) => {
                html += `
                    <div class="field-item">
                        <div class="field-info">
                            <div class="field-name">${campo.label || campo.id}</div>
                            <div class="field-type">
                                ${campo.type || 'text'} ${campo.required ? '(obrigatório)' : '(opcional)'}
                            </div>
                        </div>
                        <div class="field-actions">
                            <button class="btn btn-small btn-secondary" onclick="editField(${index})">Editar</button>
                            <button class="btn btn-small btn-danger" onclick="removeField(${index})">Remover</button>
                        </div>
                    </div>
                `;
            });

            fieldsList.innerHTML = html;
        }

        // Edit field
        function editField(index) {
            if (!currentFormData || !currentFormData.campos || !currentFormData.campos[index]) {
                return;
            }

            const campo = currentFormData.campos[index];
            
            // Populate form with field data
            document.getElementById('fieldId').value = campo.id || '';
            document.getElementById('fieldLabel').value = campo.label || '';
            document.getElementById('fieldType').value = campo.type || 'text';
            document.getElementById('fieldPlaceholder').value = campo.placeholder || '';
            document.getElementById('fieldRequired').checked = campo.required || false;
            
            if (campo.options && Array.isArray(campo.options)) {
                document.getElementById('fieldOptionsText').value = campo.options.join('\n');
            }

            // Handle field type change
            handleFieldTypeChange();

            // Remove the field (will be re-added when user clicks "Adicionar Campo")
            currentFormData.campos.splice(index, 1);
            
            // Update editors
            document.getElementById('jsonEditor').value = JSON.stringify(currentFormData, null, 2);
            validateJson();
            updateVisualEditor();

            showStatus('Campo carregado para edição', 'success');
        }

        // Remove field
        function removeField(index) {
            if (!currentFormData || !currentFormData.campos || !currentFormData.campos[index]) {
                return;
            }

            const campo = currentFormData.campos[index];
            if (!confirm(`Remover campo "${campo.label || campo.id}"?`)) {
                return;
            }

            currentFormData.campos.splice(index, 1);
            
            // Update editors
            document.getElementById('jsonEditor').value = JSON.stringify(currentFormData, null, 2);
            validateJson();
            updateVisualEditor();

            showStatus('Campo removido com sucesso!', 'success');
        }

        // Load available forms
        async function loadForms() {
            try {
                showLoading(true);

                if (window.smartCache && window.smartCache.listAvailableForms) {
                    availableForms = await window.smartCache.listAvailableForms();
                } else {
                    // Fallback: list from storage directly
                    const { data, error } = await supabaseClient.storage
                        .from('suite')
                        .list('forms');

                    if (error) throw error;

                    availableForms = data
                        .filter(file => file.name.endsWith('.json'))
                        .map(file => ({
                            id: file.name.replace('.json', ''),
                            name: file.name,
                            size: file.metadata?.size || 0,
                            lastModified: file.updated_at
                        }));
                }

                renderFormsList();
                showLoading(false);
            } catch (error) {
                console.error('Error loading forms:', error);
                showStatus('Erro ao carregar formulários: ' + error.message, 'error');
                showLoading(false);
            }
        }

        // Render forms list
        function renderFormsList() {
            const container = document.getElementById('formsList');
            
            // Remove apenas os cards de formulários, mantendo o elemento .loading
            const existingCards = container.querySelectorAll('.form-card');
            existingCards.forEach(card => card.remove());
            
            // Remove mensagem de "nenhum formulário encontrado" se existir
            const noFormsMessage = container.querySelector('p');
            if (noFormsMessage) noFormsMessage.remove();

            if (availableForms.length === 0) {
                const message = document.createElement('p');
                message.textContent = 'Nenhum formulário encontrado.';
                container.appendChild(message);
                return;
            }

            availableForms.forEach(form => {
                const card = document.createElement('div');
                card.className = 'form-card';
                card.onclick = () => selectForm(form);

                card.innerHTML = `
                    <h3 class="form-title">${form.id}</h3>
                    <div class="form-meta">
                        Tamanho: ${formatBytes(form.size)}<br>
                        Modificado: ${formatDate(form.lastModified)}
                    </div>
                    <div class="form-actions">
                        <button class="btn btn-secondary" onclick="event.stopPropagation(); selectFormById('${form.id}')">Editar</button>
                    </div>
                `;

                container.appendChild(card);
            });
        }

        // Select form by ID (helper function for onclick events)
        function selectFormById(formId) {
            const form = availableForms.find(f => f.id === formId);
            if (form) {
                selectForm(form);
            } else {
                showStatus('Formulário não encontrado', 'error');
            }
        }

        // Select form for editing
        async function selectForm(form) {
            try {
                // Validate form parameter
                if (!form || !form.id) {
                    showStatus('Formulário inválido selecionado', 'error');
                    return;
                }

                currentForm = form;

                // Update UI
                document.querySelectorAll('.form-card').forEach(card => {
                    card.classList.remove('selected');
                });
                
                // Only try to add selected class if event exists
                if (event && event.currentTarget) {
                    event.currentTarget.classList.add('selected');
                }

                document.getElementById('currentFormName').textContent = form.id;
                document.getElementById('editorSection').style.display = 'block';

                // Load form content
                showStatus('Carregando formulário...', 'info');
                let formData;

                if (window.smartCache && window.smartCache.loadForm) {
                    formData = await window.smartCache.loadForm(form.id);
                } else {
                    // Fallback: load directly from storage
                    const { data, error } = await supabaseClient.storage
                        .from('suite')
                        .download(`forms/${form.id}.json`);

                    if (error) throw error;
                    formData = JSON.parse(await data.text());
                }

                // Populate editor
                document.getElementById('jsonEditor').value = JSON.stringify(formData, null, 2);

                // Update current form data
                currentFormData = formData;

                // Validate JSON
                validateJson();

                // Generate preview
                generatePreview(formData);

                showStatus('Formulário carregado com sucesso!', 'success');
            } catch (error) {
                console.error('Error loading form:', error);
                showStatus('Erro ao carregar formulário: ' + error.message, 'error');
            }
        }

        // Generate form preview
        function generatePreview(formData) {
            const preview = document.getElementById('formPreview');

            if (!formData.campos || !Array.isArray(formData.campos)) {
                preview.innerHTML = '<p class="field-info">Formulário sem campos definidos</p>';
                return;
            }

            let html = `<h4>${formData.titulo || 'Formulário'}</h4>`;
            if (formData.descricao) {
                html += `<p class="field-info">${formData.descricao}</p>`;
            }

            formData.campos.forEach(campo => {
                html += `
                    <div class="field-preview">
                        <div class="field-label">${campo.label || campo.id}</div>
                        <div class="field-info">
                            Tipo: ${campo.type || campo.tipo || 'Não definido'} |
                            Obrigatório: ${campo.required ? 'Sim' : 'Não'}
                        </div>
                    </div>
                `;
            });

            preview.innerHTML = html;
        }

        // Save form
        async function saveForm() {
            if (!currentForm) {
                showStatus('Nenhum formulário selecionado', 'error');
                return;
            }

            try {
                const jsonText = document.getElementById('jsonEditor').value;

                // Validate JSON
                if (!validateJson()) {
                    showStatus('Corrija os erros no JSON antes de salvar', 'error');
                    return;
                }

                showStatus('Salvando formulário...', 'info');

                // Convert to blob and upload
                const blob = new Blob([jsonText], { type: 'application/json' });
                const file = new File([blob], `${currentForm.id}.json`, { type: 'application/json' });

                const { data, error } = await supabaseClient.storage
                    .from('suite')
                    .update(`forms/${currentForm.id}.json`, file, {
                        upsert: true
                    });

                if (error) throw error;

                // Clear cache if SmartCache is available
                if (window.smartCache && window.smartCache.clearFormCache) {
                    window.smartCache.clearFormCache(currentForm.id);
                }

                showStatus('Formulário salvo com sucesso!', 'success');

                // Update preview
                generatePreview(currentFormData);

                // Refresh forms list to update metadata
                await loadForms();

            } catch (error) {
                console.error('Error saving form:', error);
                showStatus('Erro ao salvar: ' + error.message, 'error');
            }
        }

        // Delete form
        async function deleteForm() {
            if (!currentForm) {
                showStatus('Nenhum formulário selecionado', 'error');
                return;
            }

            if (!confirm(`Tem certeza que deseja excluir o formulário "${currentForm.id}"?`)) {
                return;
            }

            try {
                showStatus('Excluindo formulário...', 'info');

                const { error } = await supabaseClient.storage
                    .from('suite')
                    .remove([`forms/${currentForm.id}.json`]);

                if (error) throw error;

                showStatus('Formulário excluído com sucesso!', 'success');

                // Reset UI
                document.getElementById('editorSection').style.display = 'none';
                currentForm = null;

                // Refresh list
                await loadForms();

            } catch (error) {
                console.error('Error deleting form:', error);
                showStatus('Erro ao excluir: ' + error.message, 'error');
            }
        }

        // Download form
        function downloadForm() {
            if (!currentForm) {
                showStatus('Nenhum formulário selecionado', 'error');
                return;
            }

            const jsonText = document.getElementById('jsonEditor').value;
            const blob = new Blob([jsonText], { type: 'application/json' });
            const url = URL.createObjectURL(blob);

            const a = document.createElement('a');
            a.href = url;
            a.download = `${currentForm.id}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);

            URL.revokeObjectURL(url);
        }

        // Create new form
        function createNewForm() {
            const formName = prompt('Digite o nome do novo formulário (sem .json):');
            if (!formName) return;

            // Check if form already exists
            if (availableForms.some(f => f.id === formName)) {
                showStatus('Formulário já existe!', 'error');
                return;
            }

            // Create basic form structure
            const newForm = {
                id: formName,
                titulo: `Formulário ${formName}`,
                descricao: "Descrição do formulário",
                campos: [
                    {
                        id: "exemplo",
                        label: "Campo de Exemplo",
                        type: "text",
                        required: true
                    }
                ]
            };

            // Set as current form
            currentForm = { id: formName, name: `${formName}.json` };
            currentFormData = newForm;
            document.getElementById('currentFormName').textContent = formName;
            document.getElementById('jsonEditor').value = JSON.stringify(newForm, null, 2);
            document.getElementById('editorSection').style.display = 'block';

            // Validate JSON
            validateJson();

            generatePreview(newForm);
            showStatus('Novo formulário criado. Clique em "Salvar" para persistir.', 'success');
        }

        // Filter forms
        function filterForms() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.querySelectorAll('.form-card');

            cards.forEach(card => {
                const title = card.querySelector('.form-title').textContent.toLowerCase();
                if (title.includes(searchTerm)) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        // Refresh forms list
        async function refreshForms() {
            await loadForms();
            showStatus('Lista atualizada!', 'success');
        }

        // Utility functions
        function showLoading(show) {
            const loading = document.querySelector('.loading');
            if (!loading) {
                // Se o elemento .loading não existe, criar um novo
                if (show) {
                    const container = document.getElementById('formsList');
                    const loadingDiv = document.createElement('div');
                    loadingDiv.className = 'loading';
                    loadingDiv.innerHTML = `
                        <div class="spinner"></div>
                        Carregando formulários...
                    `;
                    container.appendChild(loadingDiv);
                }
                return;
            }
            
            if (show) {
                loading.style.display = 'block';
            } else {
                loading.style.display = 'none';
            }
        }

        function showStatus(message, type) {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.textContent = message;
            statusDiv.className = `status-message status-${type}`;
            statusDiv.style.display = 'block';

            // Auto-hide success messages after 5 seconds
            if (type === 'success') {
                setTimeout(() => {
                    statusDiv.style.display = 'none';
                }, 5000);
            }
        }

        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function formatDate(dateString) {
            if (!dateString) return 'Nunca';
            return new Date(dateString).toLocaleString('pt-BR');
        }
    </script>
</body>
</html>
