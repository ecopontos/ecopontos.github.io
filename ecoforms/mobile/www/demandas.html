<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demandas - EcoForms</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        [x-cloak] { display: none !important; }
        .badge { @apply inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-xs font-semibold; }
        .card  { @apply bg-white rounded-xl shadow-sm border border-gray-200 p-4 mb-3 transition-all hover:shadow-md; }
        .card-mine { @apply border-l-4 border-l-blue-500; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

<div x-data="demandasApp()" x-init="init()" class="max-w-2xl mx-auto px-4 py-6">

    <!-- Cabeçalho -->
    <div class="flex items-center justify-between mb-5">
        <div class="flex items-center gap-3">
            <a href="index.html" class="text-gray-400 hover:text-gray-600">
                <i class="fas fa-arrow-left text-lg"></i>
            </a>
            <div>
                <h1 class="text-xl font-bold text-gray-900">Demandas</h1>
                <p class="text-xs text-gray-500" x-text="resumo"></p>
            </div>
        </div>
        <button @click="carregar()" class="p-2 text-blue-600 hover:bg-blue-50 rounded-lg">
            <i class="fas fa-sync-alt" :class="carregando && 'fa-spin'"></i>
        </button>
    </div>

    <!-- Filtro de status -->
    <div class="flex gap-2 mb-4 overflow-x-auto pb-1">
        <template x-for="f in filtros" :key="f.valor">
            <button @click="filtroAtivo = f.valor; aplicarFiltro()"
                    class="flex-none px-3 py-1.5 rounded-full text-sm font-medium transition-colors"
                    :class="filtroAtivo === f.valor
                        ? 'bg-blue-600 text-white'
                        : 'bg-white text-gray-600 border border-gray-300 hover:bg-gray-50'">
                <span x-text="f.label"></span>
                <span x-show="f.valor !== 'todas'" class="ml-1 opacity-75"
                      x-text="'(' + contar(f.valor) + ')'"></span>
            </button>
        </template>
    </div>

    <!-- Lista -->
    <div x-show="!carregando && demandas.length > 0">
        <template x-for="d in demandas" :key="d.id">
            <div class="card" :class="isMinhaS(d) && 'card-mine'"
                 @click="abrirDetalhe(d.id)">

                <!-- Linha 1: tipo + status -->
                <div class="flex items-start justify-between gap-2 mb-2">
                    <div class="flex-1 min-w-0">
                        <p class="font-semibold text-gray-900 truncate"
                           x-text="d.tipo_acao || d.descricao || 'Demanda #' + d.id.slice(-6)"></p>
                        <p class="text-xs text-gray-500 mt-0.5"
                           x-text="'Criada ' + formatarData(d.criada_em)"></p>
                    </div>
                    <span class="badge flex-none" :class="corStatus(d.status)" x-text="labelStatus(d.status)"></span>
                </div>

                <!-- Linha 2: metadados -->
                <div class="flex flex-wrap gap-x-4 gap-y-1 text-xs text-gray-500 mb-3">
                    <span x-show="d.destinatario_id">
                        <i class="fas fa-user mr-1"></i>
                        <span x-text="d.destinatario_id === currentUser?.id ? 'Para mim' : (d.destinatario_id || '—')"></span>
                    </span>
                    <span x-show="d.origem_tipo">
                        <i class="fas fa-tag mr-1"></i>
                        <span x-text="d.origem_tipo"></span>
                    </span>
                    <span x-show="d.aceito_em">
                        <i class="fas fa-check mr-1 text-green-600"></i>
                        <span x-text="'Aceita ' + formatarData(d.aceito_em)"></span>
                    </span>
                </div>

                <!-- Ação: Aceitar (só para demandas abertas destinadas ao usuário) -->
                <div x-show="d.status === 'aberta' && isMinhaS(d)"
                     @click.stop>
                    <button @click="aceitar(d)"
                            :disabled="aceitando === d.id"
                            class="w-full py-2 bg-blue-600 text-white text-sm font-medium rounded-lg
                                   hover:bg-blue-700 active:bg-blue-800 disabled:opacity-50 transition-colors">
                        <i class="fas fa-check-circle mr-1.5"></i>
                        <span x-text="aceitando === d.id ? 'Aceitando...' : 'Aceitar demanda'"></span>
                    </button>
                </div>

                <!-- Descricão -->
                <p x-show="d.descricao && d.tipo_acao"
                   class="text-xs text-gray-500 mt-2 line-clamp-2" x-text="d.descricao"></p>
            </div>
        </template>
    </div>

    <!-- Empty state -->
    <div x-show="!carregando && demandas.length === 0"
         class="flex flex-col items-center justify-center py-16 text-center">
        <i class="fas fa-tasks text-5xl text-gray-300 mb-4"></i>
        <p class="text-gray-500 font-medium">Nenhuma demanda encontrada</p>
        <p class="text-sm text-gray-400 mt-1" x-show="filtroAtivo !== 'todas'">
            Tente o filtro "Todas"
        </p>
    </div>

    <!-- Loading -->
    <div x-show="carregando" class="flex justify-center py-16">
        <i class="fas fa-spinner fa-spin text-3xl text-blue-400"></i>
    </div>

    <!-- Toast -->
    <div x-show="toast.visivel" x-cloak x-transition
         class="fixed bottom-6 left-1/2 -translate-x-1/2 px-5 py-3 rounded-xl text-white text-sm font-medium shadow-lg z-50"
         :class="toast.tipo === 'ok' ? 'bg-green-600' : 'bg-red-600'"
         x-text="toast.msg"></div>

</div>

<script type="module">
import { openSyncEventDB } from './js/sync/SyncEventDB.js';
import { EventBus } from './js/sync/EventBus.js';

function lerUsuario() {
    try { return JSON.parse(localStorage.getItem('currentUser') || 'null'); } catch { return null; }
}

async function lerTabela(db, tabela) {
    return new Promise((resolve, reject) => {
        const tx = db.transaction(tabela, 'readonly');
        const store = tx.objectStore(tabela);
        const req = store.getAll();
        req.onsuccess = () => resolve(req.result || []);
        req.onerror  = () => reject(req.error);
    });
}

async function escreverRegistro(db, tabela, registro) {
    return new Promise((resolve, reject) => {
        const tx = db.transaction(tabela, 'readwrite');
        const store = tx.objectStore(tabela);
        const req = store.put(registro);
        req.onsuccess = resolve;
        req.onerror  = () => reject(req.error);
    });
}

window.demandasApp = function () {
    return {
        demandas: [],
        todasDemandas: [],
        carregando: false,
        filtroAtivo: 'todas',
        aceitando: null,
        currentUser: lerUsuario(),
        toast: { visivel: false, msg: '', tipo: 'ok' },
        db: null,
        eventBus: null,

        filtros: [
            { valor: 'todas',    label: 'Todas'    },
            { valor: 'aberta',   label: 'Abertas'  },
            { valor: 'aceita',   label: 'Aceitas'  },
            { valor: 'concluida',label: 'Concluídas'},
        ],

        get resumo() {
            const abertas = this.todasDemandas.filter(d => d.status === 'aberta' && this.isMinhaS(d)).length;
            return abertas > 0 ? `${abertas} aberta(s) para você` : `${this.todasDemandas.length} no total`;
        },

        async init() {
            this.db = await openSyncEventDB();
            this.eventBus = new EventBus();
            await this.carregar();
        },

        async carregar() {
            this.carregando = true;
            try {
                const rows = await lerTabela(this.db, 'tbl_demandas');
                this.todasDemandas = rows.sort((a, b) =>
                    new Date(b.criada_em || b.created_at || 0) - new Date(a.criada_em || a.created_at || 0)
                );
                this.aplicarFiltro();
            } catch (e) {
                console.error('[Demandas] Erro ao carregar:', e);
                this.mostrarToast('Erro ao carregar demandas', 'erro');
            } finally {
                this.carregando = false;
            }
        },

        aplicarFiltro() {
            if (this.filtroAtivo === 'todas') {
                this.demandas = [...this.todasDemandas];
            } else {
                this.demandas = this.todasDemandas.filter(d => d.status === this.filtroAtivo);
            }
        },

        contar(status) {
            return this.todasDemandas.filter(d => d.status === status).length;
        },

        isMinhaS(d) {
            return this.currentUser && d.destinatario_id === this.currentUser.id;
        },

        async aceitar(demanda) {
            if (this.aceitando) return;
            this.aceitando = demanda.id;
            try {
                const agora = new Date().toISOString();
                const atualizado = {
                    ...demanda,
                    status: 'aceita',
                    aceito_por: this.currentUser?.id || null,
                    aceito_em: agora,
                    updated_at: agora,
                };
                await escreverRegistro(this.db, 'tbl_demandas', atualizado);

                // Publicar evento para sync
                await this.eventBus.publish('demanda.aceita', {
                    demanda_id: demanda.id,
                    aceito_por: this.currentUser?.id,
                    aceito_em: agora,
                }, {
                    aggregate_type: 'demanda',
                    aggregate_id: demanda.id,
                });

                await this.carregar();
                this.mostrarToast('Demanda aceita com sucesso', 'ok');
            } catch (e) {
                console.error('[Demandas] Erro ao aceitar:', e);
                this.mostrarToast('Erro ao aceitar demanda', 'erro');
            } finally {
                this.aceitando = null;
            }
        },

        abrirDetalhe(id) {
            window.location.href = `demanda-detalhe.html?id=${encodeURIComponent(id)}`;
        },

        corStatus(s) {
            return {
                aberta:    'bg-yellow-100 text-yellow-800',
                aceita:    'bg-blue-100 text-blue-700',
                concluida: 'bg-green-100 text-green-800',
                cancelada: 'bg-gray-100 text-gray-600',
            }[s] ?? 'bg-gray-100 text-gray-600';
        },

        labelStatus(s) {
            return { aberta: 'Aberta', aceita: 'Aceita', concluida: 'Concluída', cancelada: 'Cancelada' }[s] ?? s;
        },

        formatarData(iso) {
            if (!iso) return '—';
            return new Date(iso).toLocaleString('pt-BR', {
                day: '2-digit', month: '2-digit', year: '2-digit',
                hour: '2-digit', minute: '2-digit',
            });
        },

        mostrarToast(msg, tipo = 'ok') {
            this.toast = { visivel: true, msg, tipo };
            setTimeout(() => { this.toast.visivel = false; }, 3000);
        },
    };
};
</script>
</body>
</html>
