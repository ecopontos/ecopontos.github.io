<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caixa de Entrada - EcoForms</title>
    
    <!-- Supabase Client Config (injected) -->
    <meta name="supabase-url" content="">
    <meta name="supabase-anon-key" content="">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        [x-cloak] { display: none !important; }
        
        .inbox-item {
            @apply bg-white rounded-lg shadow-sm border border-gray-200 p-4 mb-3 cursor-pointer transition-all hover:shadow-md hover:border-blue-300;
        }
        
        .inbox-item.selected {
            @apply border-blue-500 bg-blue-50;
        }
        
        .status-pending { @apply bg-yellow-100 text-yellow-800; }
        .status-synced { @apply bg-green-100 text-green-800; }
        .status-error { @apply bg-red-100 text-red-800; }
        .status-draft { @apply bg-gray-100 text-gray-800; }
        
        .bar-fill {
            @apply transition-all duration-300 h-full rounded;
        }
        .bar-success { @apply bg-green-500; }
        .bar-warning { @apply bg-yellow-500; }
        .bar-danger { @apply bg-red-500; }
        
        .filter-badge {
            @apply inline-flex items-center px-3 py-1 rounded-full text-sm font-medium;
        }
        
        .search-input {
            @apply w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div class="container mx-auto px-4 py-6 max-w-7xl" x-data="inboxData()" x-init="init()">
        <!-- Cabeçalho -->
        <div class="mb-6">
            <div class="flex items-center justify-between mb-4">
                <div>
                    <h1 class="text-3xl font-bold text-gray-900">
                        <i class="fas fa-inbox text-blue-600 mr-2"></i>
                        Caixa de Entrada
                    </h1>
                    <p class="text-gray-600 mt-1">
                        <span x-text="items.length"></span> registros encontrados
                    </p>
                </div>
                
                <!-- Botões de Ação -->
                <div class="flex gap-2">
                    <button @click="loadInbox()" 
                            class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
                        <i class="fas fa-sync-alt mr-2"></i>
                        Atualizar
                    </button>
                    <button @click="exportData()" 
                            class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition">
                        <i class="fas fa-download mr-2"></i>
                        Exportar
                    </button>
                </div>
            </div>
            
            <!-- Estatísticas Rápidas -->
            <div x-show="stats" class="grid grid-cols-4 gap-4 mb-4">
                <div class="bg-white rounded-lg shadow p-4">
                    <div class="text-sm text-gray-600">Total</div>
                    <div class="text-2xl font-bold text-gray-900" x-text="items.length"></div>
                </div>
                <div class="bg-white rounded-lg shadow p-4">
                    <div class="text-sm text-gray-600">Completos</div>
                    <div class="text-2xl font-bold text-green-600" 
                         x-text="items.filter(i => i.isComplete).length"></div>
                </div>
                <div class="bg-white rounded-lg shadow p-4">
                    <div class="text-sm text-gray-600">Rascunhos</div>
                    <div class="text-2xl font-bold text-gray-600" 
                         x-text="items.filter(i => i.isDraft).length"></div>
                </div>
                <div class="bg-white rounded-lg shadow p-4">
                    <div class="text-sm text-gray-600">Média Completude</div>
                    <div class="text-2xl font-bold text-blue-600" 
                         x-text="avgCompleteness + '%'"></div>
                </div>
            </div>
        </div>

        <!-- Filtros e Busca -->
        <div class="bg-white rounded-lg shadow-sm p-4 mb-6">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                <!-- Busca -->
                <div class="lg:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        <i class="fas fa-search mr-1"></i>
                        Buscar
                    </label>
                    <input 
                        type="text" 
                        x-model="searchTerm"
                        @input.debounce.500ms="search()"
                        placeholder="Digite para buscar em todos os campos..."
                        class="search-input"
                    >
                </div>
                
                <!-- Tipo de Formulário -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        <i class="fas fa-file-alt mr-1"></i>
                        Tipo de Formulário
                    </label>
                    <select x-model="filters.formType" @change="loadInbox()" 
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                        <option value="">Todos</option>
                        <option value="ecopontoForm">Ecoponto</option>
                        <option value="ecopontoCaixasForm">Inspeção de Caixas</option>
                    </select>
                </div>
                
                <!-- Status -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        <i class="fas fa-flag mr-1"></i>
                        Status
                    </label>
                    <select x-model="filters.status" @change="loadInbox()" 
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                        <option value="">Todos</option>
                        <option value="pending">Pendente</option>
                        <option value="synced">Sincronizado</option>
                        <option value="error">Erro</option>
                        <option value="draft">Rascunho</option>
                    </select>
                </div>
            </div>
            
            <!-- Filtros Avançados (Toggle) -->
            <div x-show="showAdvancedFilters" x-cloak class="mt-4 pt-4 border-t border-gray-200">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Data Inicial</label>
                        <input type="date" x-model="filters.dateFrom" @change="loadInbox()"
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Data Final</label>
                        <input type="date" x-model="filters.dateTo" @change="loadInbox()"
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Completude Mínima (%)</label>
                        <input type="number" min="0" max="100" x-model="filters.minCompleteness" @change="loadInbox()"
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg">
                    </div>
                </div>
            </div>
            
            <!-- Toggle Filtros Avançados -->
            <div class="mt-3">
                <button @click="showAdvancedFilters = !showAdvancedFilters" 
                        class="text-sm text-blue-600 hover:text-blue-800">
                    <i class="fas" :class="showAdvancedFilters ? 'fa-chevron-up' : 'fa-chevron-down'"></i>
                    <span x-text="showAdvancedFilters ? 'Ocultar' : 'Mostrar'"></span> filtros avançados
                </button>
            </div>
        </div>

        <!-- Lista de Registros -->
        <div class="space-y-3">
            <template x-for="item in items" :key="item.id">
                <div class="inbox-item" @click="openDetail(item)">
                    <!-- Cabeçalho do Item -->
                    <div class="flex items-start justify-between mb-2">
                        <div class="flex-1">
                            <h3 class="text-lg font-semibold text-gray-900" x-text="item.title"></h3>
                            <p class="text-sm text-gray-600" x-show="item.subtitle" x-text="item.subtitle"></p>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="filter-badge" 
                                  :class="`status-${item.status}`"
                                  x-text="statusLabel(item.status)"></span>
                            <span x-show="item.isDraft" class="filter-badge bg-gray-200 text-gray-700">
                                <i class="fas fa-edit mr-1"></i> Rascunho
                            </span>
                            <span x-show="item.isValidated" class="filter-badge bg-green-200 text-green-700">
                                <i class="fas fa-check-circle mr-1"></i> Validado
                            </span>
                        </div>
                    </div>

                    <!-- Metadados -->
                    <div class="flex flex-wrap gap-4 text-sm text-gray-600 mb-3">
                        <span>
                            <i class="fas fa-user mr-1"></i>
                            <span x-text="item.user"></span>
                        </span>
                        <span>
                            <i class="fas fa-clock mr-1"></i>
                            <span x-text="formatDate(item.date)"></span>
                        </span>
                        <span x-show="item.subtitle">
                            <i class="fas fa-map-marker-alt mr-1"></i>
                            <span x-text="item.subtitle"></span>
                        </span>
                        <span>
                            <i class="fas fa-file-alt mr-1"></i>
                            <span x-text="formTypeLabel(item.formType)"></span>
                        </span>
                    </div>

                    <!-- Campos Principais -->
                    <div class="grid grid-cols-2 md:grid-cols-3 gap-3 mb-3">
                        <template x-for="(field, key) in item.mainFields" :key="key">
                            <div class="text-sm">
                                <span class="font-medium text-gray-700" x-text="field.label + ':'"></span>
                                <span class="text-gray-900 ml-1" x-text="field.value || '-'"></span>
                            </div>
                        </template>
                    </div>

                    <!-- Barra de Completude -->
                    <div class="mt-3">
                        <div class="flex items-center justify-between text-xs text-gray-600 mb-1">
                            <span>Completude</span>
                            <span x-text="`${item.completeness}%`"></span>
                        </div>
                        <div class="w-full bg-gray-200 rounded-full h-2">
                            <div class="bar-fill" 
                                 :style="`width: ${item.completeness}%`"
                                 :class="completenessClass(item.completeness)"></div>
                        </div>
                    </div>
                </div>
            </template>

            <!-- Loading State -->
            <div x-show="loading" x-cloak class="flex flex-col items-center justify-center py-12">
                <i class="fas fa-spinner fa-spin text-4xl text-blue-600 mb-4"></i>
                <p class="text-gray-600">Carregando dados...</p>
            </div>

            <!-- Empty State -->
            <div x-show="!loading && items.length === 0" x-cloak 
                 class="flex flex-col items-center justify-center py-12 bg-white rounded-lg shadow">
                <i class="fas fa-inbox text-6xl text-gray-300 mb-4"></i>
                <p class="text-xl text-gray-600 mb-2">Nenhum registro encontrado</p>
                <p class="text-gray-500">Tente ajustar os filtros ou criar um novo registro</p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/supabase-client.js"></script>
    <script src="js/utils/stable-stringify.js"></script>
    <script src="js/uuidv7.js"></script>
    <script src="js/data-service.js"></script>
    <script src="js/normalization-service.js"></script>
    
    <script>
        function inboxData() {
            return {
                items: [],
                loading: false,
                searchTerm: '',
                showAdvancedFilters: false,
                stats: true,
                filters: {
                    formType: '',
                    status: '',
                    dateFrom: '',
                    dateTo: '',
                    minCompleteness: '',
                    limit: 100
                },

                get avgCompleteness() {
                    if (this.items.length === 0) return 0;
                    const sum = this.items.reduce((acc, item) => acc + (item.completeness || 0), 0);
                    return Math.round(sum / this.items.length);
                },

                async init() {
                    // Aguardar serviços estarem disponíveis
                    if (!window.formNormalizationService) {
                        console.log('⏳ Aguardando FormNormalizationService...');
                        await new Promise(resolve => {
                            const checkInterval = setInterval(() => {
                                if (window.formNormalizationService) {
                                    clearInterval(checkInterval);
                                    resolve();
                                }
                            }, 100);
                        });
                    }
                    
                    await this.loadInbox();
                },

                async loadInbox() {
                    this.loading = true;
                    try {
                        this.items = await window.formNormalizationService.loadInbox(this.filters);
                        console.log(`✅ ${this.items.length} registros carregados`);
                    } catch (error) {
                        console.error('Erro ao carregar inbox:', error);
                        alert('Erro ao carregar dados. Verifique a conexão.');
                    } finally {
                        this.loading = false;
                    }
                },

                async search() {
                    if (!this.searchTerm.trim()) {
                        return this.loadInbox();
                    }

                    this.loading = true;
                    try {
                        const results = await window.formNormalizationService.search(
                            this.searchTerm,
                            this.filters
                        );
                        
                        // Converter resultados para formato de inbox
                        this.items = await Promise.all(
                            results.map(r => window.formNormalizationService.createInboxSummary(r))
                        );
                        
                        console.log(`🔍 ${this.items.length} resultados da busca`);
                    } catch (error) {
                        console.error('Erro na busca:', error);
                        alert('Erro na busca. Tente novamente.');
                    } finally {
                        this.loading = false;
                    }
                },

                openDetail(item) {
                    // Abrir página de detalhes ou modal
                    console.log('Abrir detalhes:', item);
                    window.location.href = `form-view.html?id=${item.id}&type=${item.formType}`;
                },

                formatDate(date) {
                    if (!date) return '-';
                    return new Date(date).toLocaleString('pt-BR', {
                        day: '2-digit',
                        month: '2-digit',
                        year: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                },

                completenessClass(value) {
                    if (value >= 80) return 'bar-success';
                    if (value >= 50) return 'bar-warning';
                    return 'bar-danger';
                },

                statusLabel(status) {
                    const labels = {
                        'pending': 'Pendente',
                        'synced': 'Sincronizado',
                        'error': 'Erro',
                        'draft': 'Rascunho'
                    };
                    return labels[status] || status;
                },

                formTypeLabel(type) {
                    const labels = {
                        'ecopontoForm': 'Ecoponto',
                        'ecopontoCaixasForm': 'Inspeção de Caixas'
                    };
                    return labels[type] || type;
                },

                async exportData() {
                    alert('Exportação será implementada em breve!');
                    // TODO: Implementar exportação CSV
                }
            }
        }
    </script>
</body>
</html>
