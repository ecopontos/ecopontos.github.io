<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoForms - Gerenciamento de Setores</title>
    <link href="css/design-system.css" rel="stylesheet">

    <!-- Supabase Configuration -->
    <meta name="supabase-url" content="https://vnnimekczkxkpckrydnc.supabase.co">
    <meta name="supabase-key"
        content="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZubmltZWtjemt4a3Bja3J5ZG5jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjE1MDQ0NjUsImV4cCI6MjA3NzA4MDQ2NX0.RqLwcGIv5B5QnTfxvbemtTEx_Lve9Q6hqbab9SKA6aA">
    <meta name="supabase-table" content="tbl_setores">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            padding: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 28px;
            color: #4CAF50;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .subtitle {
            color: #666;
            font-size: 16px;
        }

        .actions-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary { background: #4CAF50; color: white; }
        .btn-primary:hover { background: #45a049; transform: translateY(-2px); }
        .btn-secondary { background: #6c757d; color: white; }
        .btn-secondary:hover { background: #545b62; }
        .btn-warning { background: #ffc107; color: #333; }
        .btn-warning:hover { background: #ffb300; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-danger:hover { background: #c82333; }

        .dashboard-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            border-left: 5px solid #4CAF50;
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .stat-title { color: #666; font-size: 14px; margin-bottom: 10px; }
        .stat-value { font-size: 24px; font-weight: bold; color: #333; }

        .sectors-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.05);
        }

        .sectors-table th, .sectors-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        .sectors-table th { background: #f8f9fa; font-weight: 600; color: #333; }
        .sectors-table tr:hover { background: #fdfdfd; }

        .status-badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-active { background: #e8f5e9; color: #2e7d32; }
        .status-inactive { background: #ffebee; color: #c62828; }

        .actions-cell {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            padding: 5px;
            border-radius: 5px;
            transition: background 0.3s ease;
        }

        .action-btn:hover { background: #f0f0f0; }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
        }

        .modal-content {
            background: white;
            width: 90%;
            max-width: 500px;
            margin: 50px auto;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 5px 30px rgba(0,0,0,0.3);
            position: relative;
        }

        .modal-header { margin-bottom: 25px; }
        .modal-title { font-size: 24px; font-weight: bold; color: #333; }
        .modal-subtitle { color: #666; font-size: 14px; margin-top: 5px; }
        
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; margin-bottom: 8px; font-weight: 600; color: #444; }
        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
        }
        
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-top: 30px;
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .alert-info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }

        .hidden { display: none !important; }

        @media (max-width: 768px) {
            .sectors-table { display: block; overflow-x: auto; }
            .actions-bar { flex-direction: column; align-items: stretch; }
            .actions-bar .btn { width: 100%; text-align: center; }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="logo">🌿 EcoForms</div>
            <div class="subtitle">Gerenciamento de Setores e Grupos</div>
        </div>

        <!-- Dashboard Stats -->
        <div class="dashboard-stats">
            <div class="stat-card">
                <div class="stat-title">Total de Setores</div>
                <div class="stat-value" id="total-sectors">0</div>
            </div>
            <div class="stat-card" style="border-left-color: #28a745;">
                <div class="stat-title">Setores Ativos</div>
                <div class="stat-value" id="active-sectors">0</div>
            </div>
        </div>

        <!-- Ações -->
        <div class="actions-bar">
            <div>
                <button class="btn btn-primary" id="btn-create-sector" onclick="showAddSectorModal()" style="display: none;">
                    + Novo Setor
                </button>
            </div>
            <div>
                <button class="btn btn-secondary" onclick="window.location.href='user-management.html'">
                    👥 Gestão de Usuários
                </button>
                <button class="btn btn-warning" onclick="window.location.href='index.html'">
                    🏠 Ir ao App
                </button>
            </div>
        </div>

        <!-- Área de Alertas -->
        <div id="alert-container"></div>

        <!-- Tabela -->
        <table class="sectors-table" id="sectors-table">
            <thead>
                <tr>
                    <th>Nome do Setor</th>
                    <th>Descrição</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="sectors-tbody">
                <tr>
                    <td colspan="4" style="text-align: center; padding: 40px; color: #666;">
                        Carregando setores...
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Modal -->
    <div id="sector-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="modal-title">Novo Setor</div>
                <div class="modal-subtitle" id="modal-subtitle">Preencha os dados do setor</div>
            </div>

            <form id="sector-form">
                <input type="hidden" id="sector-id" value="">

                <div class="form-group">
                    <label class="form-label" for="sector-nome">Nome do Setor</label>
                    <input type="text" id="sector-nome" class="form-control" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="sector-descricao">Descrição</label>
                    <textarea id="sector-descricao" class="form-control" rows="3"></textarea>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
                    <button type="submit" class="btn btn-primary">
                        <span id="submit-text">Salvar</span>
                        <span id="submit-loading" class="hidden">Salvando...</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/uuidv7.js"></script>
    <script src="js/rbac-matrix.generated.js"></script>
    <script src="js/auth-manager.js"></script>

    <script>
        // Variáveis globais
        let authManager = null;
        let supabaseClient = null;

        // Inicialização
        document.addEventListener('DOMContentLoaded', async () => {
            await initializeApp();
            await loadSectors();
        });

        async function initializeApp() {
            try {
                const metaUrl = document.querySelector('meta[name="supabase-url"]')?.content || '';
                const metaKey = document.querySelector('meta[name="supabase-key"]')?.content || '';
                
                try {
                    if (!supabaseClient && typeof supabase !== 'undefined') {
                        supabaseClient = supabase.createClient(metaUrl, metaKey);
                    }
                } catch (e) {
                    console.warn('Erro ao criar cliente Supabase:', e);
                }

                authManager = new AuthManager();
                await authManager.init(supabaseClient);

                // ✅ VERIFICAÇÃO DE ACESSO
                if (!authManager.isLoggedIn() || (!authManager.isAdmin() && !authManager.hasPermission('users.view_all'))) {
                    showAlert('Acesso negado.', 'error');
                    setTimeout(() => window.location.href = 'index.html', 2000);
                    return;
                }

                // Habilitar botões
                if (authManager.isAdmin() || authManager.hasPermission('sectors.create')) {
                    document.getElementById('btn-create-sector').style.display = 'inline-block';
                }
            } catch (error) {
                console.error('Erro ao inicializar:', error);
                showAlert('Erro na inicialização do sistema', 'error');
            }
        }

        async function loadSectors() {
            try {
                const tbody = document.getElementById('sectors-tbody');
                tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; padding: 40px;">Carregando...</td></tr>';

                let sectors = [];

                if (authManager && authManager.supabaseClient) {
                    const { data, error } = await authManager.supabaseClient
                        .from('tbl_setores')
                        .select('*')
                        .order('nome');

                    if (!error && data) {
                        sectors = data;
                    }
                }

                renderSectors(sectors);
                updateStats(sectors);

            } catch (error) {
                console.error('Erro ao carregar setores:', error);
                showAlert('Erro ao carregar setores', 'error');
            }
        }

        function renderSectors(sectors) {
            const tbody = document.getElementById('sectors-tbody');

            if (sectors.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; padding: 40px; color: #666;">Nenhum setor encontrado</td></tr>';
                return;
            }

            tbody.innerHTML = sectors.map(sector => {
                const canEdit = authManager && (authManager.isAdmin() || authManager.hasPermission('sectors.edit'));
                const canDelete = authManager && (authManager.isAdmin() || authManager.hasPermission('sectors.delete'));

                const encodedName = encodeURIComponent(sector.nome);
                const encodedDesc = encodeURIComponent(sector.descricao || '');

                const editButton = canEdit 
                    ? \`<button class="action-btn" onclick="editSector('\${sector.id}', '\${encodedName}', '\${encodedDesc}')">✏️</button>\`
                    : '';
                
                const deleteButton = canDelete
                    ? \`<button class="action-btn delete-btn" onclick="deleteSector('\${sector.id}')">🗑️</button>\`
                    : '';

                return \`
                <tr>
                    <td>\${sector.nome}</td>
                    <td>\${sector.descricao || '-'}</td>
                    <td><span class="status-badge \${sector.ativo ? 'status-active' : 'status-inactive'}">\${sector.ativo ? 'Ativo' : 'Inativo'}</span></td>
                    <td class="actions-cell">
                        \${editButton}
                        \${canEdit ? \`<button class="action-btn toggle-btn" onclick="toggleSectorStatus('\${sector.id}', \${sector.ativo})">\${sector.ativo ? '🚫' : '✅'}</button>\` : ''}
                        \${deleteButton}
                    </td>
                </tr>\`;
            }).join('');
        }

        function updateStats(sectors) {
            document.getElementById('total-sectors').textContent = sectors.length;
            document.getElementById('active-sectors').textContent = sectors.filter(s => s.ativo).length;
        }

        function showAddSectorModal() {
            document.getElementById('modal-title').textContent = 'Novo Setor';
            document.getElementById('modal-subtitle').textContent = 'Preencha os dados do setor';
            document.getElementById('sector-form').reset();
            document.getElementById('sector-id').value = '';
            document.getElementById('sector-modal').style.display = 'block';
        }

        function editSector(id, encodedName, encodedDesc) {
            document.getElementById('modal-title').textContent = 'Editar Setor';
            document.getElementById('modal-subtitle').textContent = 'Altere os dados do setor';
            document.getElementById('sector-id').value = id;
            document.getElementById('sector-nome').value = decodeURIComponent(encodedName);
            document.getElementById('sector-descricao').value = decodeURIComponent(encodedDesc);
            document.getElementById('sector-modal').style.display = 'block';
        }

        async function toggleSectorStatus(id, currentStatus) {
            if (!confirm(\`Deseja \${currentStatus ? 'desativar' : 'reativar'} este setor?\`)) return;
            try {
                showAlert('Atualizando...', 'info');
                const { error } = await authManager.supabaseClient.from('tbl_setores').update({ ativo: !currentStatus }).eq('id', id);
                if (error) throw error;
                showAlert('Status atualizado!', 'success');
                await loadSectors();
            } catch (err) { showAlert('Erro ao atualizar status', 'error'); }
        }

        async function deleteSector(id) {
            if (!confirm('ATENÇÃO: Deseja realmente excluir este setor e remover os vínculos de usuário?')) return;
            try {
                showAlert('Excluindo...', 'info');
                const { error } = await authManager.supabaseClient.from('tbl_setores').delete().eq('id', id);
                if (error) throw error;
                showAlert('Setor excluído com sucesso!', 'success');
                await loadSectors();
            } catch (err) { showAlert('Erro ao excluir setor', 'error'); }
        }

        document.getElementById('sector-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('sector-id').value;
            const data = {
                nome: document.getElementById('sector-nome').value,
                descricao: document.getElementById('sector-descricao').value,
                ativo: true
            };

            document.getElementById('submit-text').classList.add('hidden');
            document.getElementById('submit-loading').classList.remove('hidden');

            try {
                if (id) {
                    const { error } = await authManager.supabaseClient.from('tbl_setores').update(data).eq('id', id);
                    if (error) throw error;
                    showAlert('Setor atualizado!', 'success');
                } else {
                    const { error } = await authManager.supabaseClient.from('tbl_setores').insert([data]);
                    if (error) throw error;
                    showAlert('Setor criado!', 'success');
                }
                closeModal();
                await loadSectors();
            } catch (err) {
                showAlert('Erro ao salvar setor', 'error');
            } finally {
                document.getElementById('submit-text').classList.remove('hidden');
                document.getElementById('submit-loading').classList.add('hidden');
            }
        });

        function closeModal() { document.getElementById('sector-modal').style.display = 'none'; }
        
        function showAlert(message, type) {
            const container = document.getElementById('alert-container');
            container.innerHTML = \`<div class="alert alert-\${type}">\${message}</div>\`;
            setTimeout(() => container.innerHTML = '', 4000);
        }

        document.getElementById('sector-modal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('sector-modal')) closeModal();
        });
    </script>
</body>
</html>
