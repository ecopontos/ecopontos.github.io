<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarefas — EcoForms</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        [x-cloak] { display: none !important; }
        .badge { @apply inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-xs font-semibold; }
        .kanban-col { @apply flex-none w-[85vw] sm:w-[320px] bg-gray-100 rounded-xl p-3 flex flex-col gap-2; }
        .card {
            @apply bg-white rounded-lg shadow-sm border border-gray-200 p-3 transition-all;
        }
        .card:active { @apply shadow-md scale-[0.98]; }
        .kanban-scroll {
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }
        .kanban-scroll > * { scroll-snap-align: start; }
        .btn-transition {
            @apply inline-flex items-center gap-1 px-2 py-1 text-xs font-medium rounded-lg
                   transition-colors active:scale-95;
        }
        .chip-filter {
            @apply px-3 py-1.5 text-xs font-medium rounded-full border transition-colors cursor-pointer select-none;
        }
        .chip-filter.active {
            @apply bg-blue-600 text-white border-blue-600;
        }
        .chip-filter:not(.active) {
            @apply bg-white text-gray-600 border-gray-300 hover:border-blue-400 hover:text-blue-600;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

<div x-data="tarefasApp()" x-init="init()" class="max-w-6xl mx-auto px-4 py-6">

    <!-- Cabeçalho -->
    <div class="flex items-center gap-3 mb-4">
        <a href="demandas.html" class="text-gray-400 hover:text-gray-600">
            <i class="fas fa-arrow-left text-lg"></i>
        </a>
        <div class="flex-1 min-w-0">
            <h1 class="text-xl font-bold text-gray-900">Tarefas</h1>
            <p class="text-xs text-gray-500">
                <span x-text="todas.length"></span> tarefa<span x-show="todas.length !== 1">s</span>
            </p>
        </div>
        <button @click="abrirFiltros = !abrirFiltros"
                class="relative p-2 rounded-lg text-gray-500 hover:bg-gray-200 transition-colors">
            <i class="fas fa-filter text-lg"></i>
            <span x-show="filtrosAtivos > 0"
                  class="absolute -top-0.5 -right-0.5 w-4 h-4 text-[10px] font-bold text-white bg-blue-600 rounded-full
                         inline-flex items-center justify-center"
                  x-text="filtrosAtivos > 9 ? '9+' : filtrosAtivos"></span>
        </button>
    </div>

    <!-- Filtros -->
    <div x-show="abrirFiltros" x-cloak x-transition
         class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 mb-4 space-y-3">
        <div>
            <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide block mb-1.5">Prioridade</label>
            <div class="flex flex-wrap gap-1.5">
                <template x-for="p in ['todas','alta','media','baixa']" :key="p">
                    <button @click="filtroPrioridade = p"
                            class="chip-filter"
                            :class="{ active: filtroPrioridade === p }"
                            x-text="p === 'todas' ? 'Todas' : p.charAt(0).toUpperCase() + p.slice(1)"></button>
                </template>
            </div>
        </div>
        <div>
            <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide block mb-1.5">Demanda</label>
            <select x-model="filtroDemanda"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white">
                <option value="">Todas as demandas</option>
                <template x-for="d in demandasUnicas" :key="d.id">
                    <option :value="d.id" x-text="d.titulo || 'Demanda #' + d.id.slice(-6)"></option>
                </template>
            </select>
        </div>
        <div class="flex items-center gap-3">
            <label class="flex items-center gap-2 cursor-pointer select-none">
                <input type="checkbox" x-model="filtroMinhas"
                       class="w-4 h-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                <span class="text-sm text-gray-700">Somente minhas tarefas</span>
            </label>
        </div>
        <div class="flex gap-2">
            <button @click="limparFiltros()"
                    class="text-xs text-gray-500 hover:text-gray-700 underline">Limpar filtros</button>
            <button @click="abrirFiltros = false"
                    class="text-xs text-blue-600 hover:text-blue-800 underline">Fechar</button>
        </div>
    </div>

    <!-- Loading -->
    <div x-show="carregando" class="flex justify-center py-16">
        <i class="fas fa-spinner fa-spin text-3xl text-blue-400"></i>
    </div>

    <!-- Kanban -->
    <div x-show="!carregando" x-cloak
         class="flex gap-3 overflow-x-auto pb-4 kanban-scroll"
         style="scrollbar-width: thin;">

        <!-- Coluna: A Fazer -->
        <div class="kanban-col">
            <div class="flex items-center justify-between mb-1 px-1">
                <div class="flex items-center gap-2">
                    <span class="w-2.5 h-2.5 rounded-full bg-yellow-400"></span>
                    <h2 class="text-sm font-semibold text-gray-700">A Fazer</h2>
                </div>
                <span class="text-xs font-bold text-gray-500 bg-gray-200 rounded-full px-2 py-0.5"
                      x-text="colunas.a_fazer.length"></span>
            </div>
            <template x-for="t in colunas.a_fazer" :key="t.id">
                <div class="card" x-bind="tarefaCard(t)">
                    <div class="flex items-start justify-between gap-2">
                        <div class="flex-1 min-w-0">
                            <p class="text-sm font-medium text-gray-900 truncate"
                               x-text="t.titulo || 'Tarefa #' + t.id.slice(-4)"></p>
                            <p class="text-xs text-gray-400 mt-0.5 line-clamp-2" x-show="t.descricao"
                               x-text="t.descricao"></p>
                        </div>
                        <span class="badge flex-none" :class="corPrioridade(t.prioridade)"
                              x-text="labelPrioridade(t.prioridade)"></span>
                    </div>
                    <div class="flex flex-wrap items-center gap-2 mt-2 text-xs text-gray-500">
                        <span x-show="t.atribuido_para" class="flex items-center gap-1">
                            <i class="fas fa-user text-gray-400"></i>
                            <span x-text="t.atribuido_para === currentUser?.id ? 'Você' : t.atribuido_para"></span>
                        </span>
                        <span x-show="t.prazo" class="flex items-center gap-1">
                            <i class="fas fa-calendar text-gray-400"></i>
                            <span x-text="formatarDataCurta(t.prazo)"></span>
                        </span>
                    </div>
                    <div x-show="t.demanda_id" class="mt-1.5">
                        <a :href="'demanda-detalhe.html?id=' + t.demanda_id"
                           class="inline-flex items-center gap-1 text-xs text-blue-600 hover:underline">
                            <i class="fas fa-link text-[10px]"></i>
                            <span x-text="nomeDemanda(t.demanda_id)"></span>
                        </a>
                    </div>
                    <div class="flex items-center gap-1.5 mt-3 pt-2 border-t border-gray-100">
                        <button @click="moverColuna(t, 'em_andamento')"
                                :disabled="movendo[t.id]"
                                class="btn-transition bg-blue-50 text-blue-700 hover:bg-blue-100
                                       disabled:opacity-50 disabled:cursor-wait">
                            <i class="fas fa-play text-[10px]"></i> Iniciar
                        </button>
                    </div>
                </div>
            </template>
            <div x-show="colunas.a_fazer.length === 0"
                 class="flex flex-col items-center justify-center py-8 text-center">
                <i class="fas fa-tasks text-2xl text-gray-300 mb-2"></i>
                <p class="text-xs text-gray-400">Nenhuma tarefa</p>
            </div>
        </div>

        <!-- Coluna: Em Andamento -->
        <div class="kanban-col">
            <div class="flex items-center justify-between mb-1 px-1">
                <div class="flex items-center gap-2">
                    <span class="w-2.5 h-2.5 rounded-full bg-blue-500"></span>
                    <h2 class="text-sm font-semibold text-gray-700">Em Andamento</h2>
                </div>
                <span class="text-xs font-bold text-gray-500 bg-gray-200 rounded-full px-2 py-0.5"
                      x-text="colunas.em_andamento.length"></span>
            </div>
            <template x-for="t in colunas.em_andamento" :key="t.id">
                <div class="card" x-bind="tarefaCard(t)">
                    <div class="flex items-start justify-between gap-2">
                        <div class="flex-1 min-w-0">
                            <p class="text-sm font-medium text-gray-900 truncate"
                               x-text="t.titulo || 'Tarefa #' + t.id.slice(-4)"></p>
                            <p class="text-xs text-gray-400 mt-0.5 line-clamp-2" x-show="t.descricao"
                               x-text="t.descricao"></p>
                        </div>
                        <span class="badge flex-none" :class="corPrioridade(t.prioridade)"
                              x-text="labelPrioridade(t.prioridade)"></span>
                    </div>
                    <div class="flex flex-wrap items-center gap-2 mt-2 text-xs text-gray-500">
                        <span x-show="t.atribuido_para" class="flex items-center gap-1">
                            <i class="fas fa-user text-gray-400"></i>
                            <span x-text="t.atribuido_para === currentUser?.id ? 'Você' : t.atribuido_para"></span>
                        </span>
                        <span x-show="t.prazo" class="flex items-center gap-1">
                            <i class="fas fa-calendar text-gray-400"></i>
                            <span x-text="formatarDataCurta(t.prazo)"></span>
                        </span>
                    </div>
                    <div x-show="t.demanda_id" class="mt-1.5">
                        <a :href="'demanda-detalhe.html?id=' + t.demanda_id"
                           class="inline-flex items-center gap-1 text-xs text-blue-600 hover:underline">
                            <i class="fas fa-link text-[10px]"></i>
                            <span x-text="nomeDemanda(t.demanda_id)"></span>
                        </a>
                    </div>
                    <div class="flex items-center gap-1.5 mt-3 pt-2 border-t border-gray-100">
                        <button @click="moverColuna(t, 'a_fazer')"
                                :disabled="movendo[t.id]"
                                class="btn-transition bg-gray-100 text-gray-600 hover:bg-gray-200
                                       disabled:opacity-50 disabled:cursor-wait">
                            <i class="fas fa-undo text-[10px]"></i>
                        </button>
                        <button @click="moverColuna(t, 'concluido')"
                                :disabled="movendo[t.id]"
                                class="btn-transition bg-green-50 text-green-700 hover:bg-green-100
                                       disabled:opacity-50 disabled:cursor-wait">
                            <i class="fas fa-check text-[10px]"></i> Concluir
                        </button>
                    </div>
                </div>
            </template>
            <div x-show="colunas.em_andamento.length === 0"
                 class="flex flex-col items-center justify-center py-8 text-center">
                <i class="fas fa-spinner text-2xl text-gray-300 mb-2"></i>
                <p class="text-xs text-gray-400">Nenhuma tarefa em andamento</p>
            </div>
        </div>

        <!-- Coluna: Concluído -->
        <div class="kanban-col">
            <div class="flex items-center justify-between mb-1 px-1">
                <div class="flex items-center gap-2">
                    <span class="w-2.5 h-2.5 rounded-full bg-green-500"></span>
                    <h2 class="text-sm font-semibold text-gray-700">Concluído</h2>
                </div>
                <span class="text-xs font-bold text-gray-500 bg-gray-200 rounded-full px-2 py-0.5"
                      x-text="colunas.concluido.length"></span>
            </div>
            <template x-for="t in colunas.concluido" :key="t.id">
                <div class="card opacity-75" x-bind="tarefaCard(t)">
                    <div class="flex items-start justify-between gap-2">
                        <div class="flex-1 min-w-0">
                            <p class="text-sm font-medium text-gray-700 truncate line-through"
                               x-text="t.titulo || 'Tarefa #' + t.id.slice(-4)"></p>
                            <p class="text-xs text-gray-400 mt-0.5 line-clamp-2" x-show="t.descricao"
                               x-text="t.descricao"></p>
                        </div>
                        <span class="badge flex-none bg-gray-100 text-gray-500 text-xs">
                            <i class="fas fa-check text-[10px]"></i>
                        </span>
                    </div>
                    <div class="flex flex-wrap items-center gap-2 mt-2 text-xs text-gray-400">
                        <span x-show="t.atribuido_para" class="flex items-center gap-1">
                            <i class="fas fa-user text-gray-300"></i>
                            <span x-text="t.atribuido_para === currentUser?.id ? 'Você' : t.atribuido_para"></span>
                        </span>
                        <span x-show="t.concluido_em" class="flex items-center gap-1">
                            <i class="fas fa-clock text-gray-300"></i>
                            <span x-text="formatarDataCurta(t.concluido_em)"></span>
                        </span>
                    </div>
                    <div x-show="t.demanda_id" class="mt-1.5">
                        <a :href="'demanda-detalhe.html?id=' + t.demanda_id"
                           class="inline-flex items-center gap-1 text-xs text-blue-500 hover:underline">
                            <i class="fas fa-link text-[10px]"></i>
                            <span x-text="nomeDemanda(t.demanda_id)"></span>
                        </a>
                    </div>
                    <div class="flex items-center gap-1.5 mt-3 pt-2 border-t border-gray-100">
                        <button @click="moverColuna(t, 'em_andamento')"
                                :disabled="movendo[t.id]"
                                class="btn-transition bg-gray-100 text-gray-500 hover:bg-gray-200
                                       disabled:opacity-50 disabled:cursor-wait">
                            <i class="fas fa-redo text-[10px]"></i> Reabrir
                        </button>
                    </div>
                </div>
            </template>
            <div x-show="colunas.concluido.length === 0"
                 class="flex flex-col items-center justify-center py-8 text-center">
                <i class="fas fa-flag-checkered text-2xl text-gray-300 mb-2"></i>
                <p class="text-xs text-gray-400">Nenhuma tarefa concluída</p>
            </div>
        </div>

    </div>

    <!-- Toast -->
    <div x-show="toast.visivel" x-cloak x-transition
         class="fixed bottom-6 left-1/2 -translate-x-1/2 px-5 py-3 rounded-xl text-white text-sm font-medium shadow-lg z-50"
         :class="toast.tipo === 'ok' ? 'bg-green-600' : 'bg-red-600'"
         x-text="toast.msg"></div>

</div>

<script type="module">
import { openSyncEventDB } from './js/sync/SyncEventDB.js';
import { EventBus } from './js/sync/EventBus.js';

function lerUsuario() {
    try { return JSON.parse(localStorage.getItem('currentUser') || 'null'); } catch { return null; }
}

async function lerTabela(db, tabela) {
    return new Promise((resolve, reject) => {
        const tx = db.transaction(tabela, 'readonly');
        const store = tx.objectStore(tabela);
        const req = store.getAll();
        req.onsuccess = () => resolve(req.result || []);
        req.onerror  = () => reject(req.error);
    });
}

async function escreverRegistro(db, tabela, registro) {
    return new Promise((resolve, reject) => {
        const tx = db.transaction(tabela, 'readwrite');
        const store = tx.objectStore(tabela);
        const req = store.put(registro);
        req.onsuccess = resolve;
        req.onerror  = () => reject(req.error);
    });
}

window.tarefasApp = function () {
    return {
        todas: [],
        colunas: { a_fazer: [], em_andamento: [], concluido: [] },
        carregando: false,
        movendo: {},
        currentUser: lerUsuario(),
        db: null,
        eventBus: null,
        toast: { visivel: false, msg: '', tipo: 'ok' },

        abrirFiltros: false,
        filtroPrioridade: 'todas',
        filtroDemanda: '',
        filtroMinhas: false,
        demandasUnicas: [],

        get filtrosAtivos() {
            let n = 0;
            if (this.filtroPrioridade !== 'todas') n++;
            if (this.filtroDemanda) n++;
            if (this.filtroMinhas) n++;
            return n;
        },

        async init() {
            this.db = await openSyncEventDB();
            const user = this.currentUser;
            this.eventBus = new EventBus(
                user?.device_id || user?.id || 'mobile-unknown',
                user?.routing_id || user?.setor_id || 'geral',
            );
            await this.carregar();
        },

        async carregar() {
            this.carregando = true;
            try {
                this.todas = await lerTabela(this.db, 'tarefas');
                this._carregarDemandas();
                this._aplicarFiltros();
            } catch (e) {
                console.error('[TarefasApp] Erro ao carregar:', e);
                this.mostrarToast('Erro ao carregar tarefas', 'erro');
            } finally {
                this.carregando = false;
            }
        },

        _carregarDemandas() {
            const map = new Map();
            const demandas = [];
            for (const t of this.todas) {
                if (t.demanda_id && !map.has(t.demanda_id)) {
                    map.set(t.demanda_id, {
                        id: t.demanda_id,
                        titulo: t.demanda_titulo || null,
                    });
                    demandas.push({ id: t.demanda_id, titulo: t.demanda_titulo || null });
                }
            }
            // Try enriching from tbl_demandas
            lerTabela(this.db, 'tbl_demandas').then(rows => {
                for (const d of rows) {
                    if (map.has(d.id) && d.tipo_acao) {
                        const existing = map.get(d.id);
                        existing.titulo = d.tipo_acao || existing.titulo;
                    }
                }
                this.demandasUnicas = Array.from(map.values());
            }).catch(() => {});
            this.demandasUnicas = demandas;
        },

        _aplicarFiltros() {
            let tarefas = [...this.todas];

            if (this.filtroPrioridade !== 'todas') {
                tarefas = tarefas.filter(t => t.prioridade === this.filtroPrioridade);
            }
            if (this.filtroDemanda) {
                tarefas = tarefas.filter(t => t.demanda_id === this.filtroDemanda);
            }
            if (this.filtroMinhas && this.currentUser) {
                const uid = this.currentUser.id;
                tarefas = tarefas.filter(t => t.atribuido_para === uid);
            }

            this.colunas = {
                a_fazer: tarefas.filter(t =>
                    t.status !== 'em_andamento' && t.status !== 'concluido' && t.status !== 'arquivado'
                ),
                em_andamento: tarefas.filter(t => t.status === 'em_andamento'),
                concluido: tarefas.filter(t => t.status === 'concluido'),
            };
        },

        limparFiltros() {
            this.filtroPrioridade = 'todas';
            this.filtroDemanda = '';
            this.filtroMinhas = false;
            this._aplicarFiltros();
        },

        async moverColuna(tarefa, novoStatus) {
            if (this.movendo[tarefa.id]) return;
            this.movendo[tarefa.id] = true;

            const agora = new Date().toISOString();
            const statusAnterior = tarefa.status;

            const atualizada = {
                ...tarefa,
                status: novoStatus,
                updated_at: agora,
                ...(novoStatus === 'concluido' ? { concluido_em: agora } : {}),
                ...(novoStatus === 'em_andamento' ? { iniciado_em: tarefa.iniciado_em || agora } : {}),
            };

            try {
                await escreverRegistro(this.db, 'tarefas', atualizada);

                if (novoStatus === 'concluido') {
                    await this.eventBus.publish('task.concluida', {
                        tarefa_id: tarefa.id,
                        concluido_por: this.currentUser?.id,
                        concluido_em: agora,
                        demanda_id: tarefa.demanda_id || null,
                    }, {
                        aggregate_type: 'task',
                        aggregate_id: tarefa.id,
                    });
                }

                await this.eventBus.publish('task.movida', {
                    tarefa_id: tarefa.id,
                    status_anterior: statusAnterior,
                    novo_status: novoStatus,
                    movido_por: this.currentUser?.id,
                    movido_em: agora,
                    demanda_id: tarefa.demanda_id || null,
                }, {
                    aggregate_type: 'task',
                    aggregate_id: tarefa.id,
                });

                // Atualiza local
                const idx = this.todas.findIndex(t => t.id === tarefa.id);
                if (idx >= 0) this.todas[idx] = atualizada;
                this._aplicarFiltros();

                const label = this.labelStatus(novoStatus);
                this.mostrarToast(`Tarefa movida para "${label}"`, 'ok');
            } catch (e) {
                console.error('[TarefasApp] Erro ao mover:', e);
                this.mostrarToast('Erro ao mover tarefa', 'erro');
            } finally {
                delete this.movendo[tarefa.id];
            }
        },

        nomeDemanda(demandaId) {
            const d = this.demandasUnicas.find(x => x.id === demandaId);
            return d?.titulo || 'Demanda #' + demandaId.slice(-6);
        },

        corPrioridade(p) {
            return {
                alta:  'bg-red-100 text-red-700',
                media: 'bg-yellow-100 text-yellow-700',
                baixa: 'bg-green-100 text-green-700',
            }[p] ?? 'bg-gray-100 text-gray-600';
        },

        labelPrioridade(p) {
            return { alta: 'Alta', media: 'Média', baixa: 'Baixa' }[p] ?? '—';
        },

        labelStatus(s) {
            return {
                a_fazer:      'A Fazer',
                em_andamento: 'Em Andamento',
                concluido:    'Concluído',
                arquivado:    'Arquivado',
            }[s] ?? s ?? '—';
        },

        formatarDataCurta(iso) {
            if (!iso) return '';
            return new Date(iso).toLocaleDateString('pt-BR', {
                day: '2-digit', month: '2-digit',
            });
        },

        mostrarToast(msg, tipo = 'ok') {
            this.toast = { visivel: true, msg, tipo };
            setTimeout(() => { this.toast.visivel = false; }, 3000);
        },

        tarefaCard(t) {
            return {};
        },
    };
};
</script>
</body>
</html>
