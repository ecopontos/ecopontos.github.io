<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teste: Conclusão de Atividades</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    h1 {
      color: #006A6A;
      margin-bottom: 24px;
    }

    .test-section {
      margin-bottom: 32px;
      padding: 16px;
      background: #f8f9fa;
      border-radius: 8px;
      border-left: 4px solid #006A6A;
    }

    .test-section h2 {
      font-size: 1.1rem;
      margin-bottom: 12px;
      color: #333;
    }

    .test-step {
      margin: 12px 0;
      padding: 12px;
      background: white;
      border-radius: 6px;
    }

    button {
      background: #006A6A;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      margin: 8px 8px 8px 0;
      transition: background 0.2s;
    }

    button:hover {
      background: #005555;
    }

    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .success {
      color: #28a745;
      font-weight: 600;
    }

    .error {
      color: #dc3545;
      font-weight: 600;
    }

    .info {
      color: #007bff;
    }

    .result {
      margin-top: 12px;
      padding: 12px;
      background: #e9ecef;
      border-radius: 6px;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      white-space: pre-wrap;
      max-height: 300px;
      overflow-y: auto;
    }

    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 0.85rem;
      font-weight: 600;
      margin-left: 8px;
    }

    .status-pending {
      background: #fff3cd;
      color: #856404;
    }

    .status-running {
      background: #cfe2ff;
      color: #084298;
    }

    .status-success {
      background: #d1e7dd;
      color: #0f5132;
    }

    .status-error {
      background: #f8d7da;
      color: #842029;
    }
  </style>
  <!-- Supabase config para ActivityService -->
  <meta name="supabase-url" content="https://vnnimekczkxkpckrydnc.supabase.co">
  <meta name="supabase-key"
    content="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZubmltZWtjemt4a3Bja3J5ZG5jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjE1MDQ0NjUsImV4cCI6MjA3NzA4MDQ2NX0.RqLwcGIv5B5QnTfxvbemtTEx_Lve9Q6hqbab9SKA6aA">
</head>

<body>
  <div class="container">
    <h1>🧪 Teste: Ciclo de Vida de Atividades</h1>

    <div class="test-section">
      <h2>1. Verificar ActivityService</h2>
      <div class="test-step">
        <button onclick="testActivityServiceExists()">Verificar Disponibilidade</button>
        <button onclick="testActivityServiceInit()">Inicializar DB</button>
        <div id="result-service" class="result" style="display:none;"></div>
      </div>
    </div>

    <div class="test-section">
      <h2>2. Simular Ciclo de Atividade</h2>
      <div class="test-step">
        <p><strong>Atividade Teste:</strong> <span id="test-activity-id">...</span></p>
        <button onclick="createTestActivity()">Criar Atividade de Teste</button>
        <button onclick="startTestActivity()" id="btn-start" disabled>Iniciar Atividade</button>
        <button onclick="completeTestActivity()" id="btn-complete" disabled>Completar Atividade</button>
        <button onclick="checkActivityStatus()" id="btn-check">Verificar Status</button>
        <div id="result-lifecycle" class="result" style="display:none;"></div>
      </div>
    </div>

    <div class="test-section">
      <h2>3. Verificar Cache Local</h2>
      <div class="test-step">
        <button onclick="listLocalActivities()">Listar Atividades em Cache</button>
        <button onclick="clearLocalCache()">Limpar Cache</button>
        <div id="result-cache" class="result" style="display:none;"></div>
      </div>
    </div>

    <div class="test-section">
      <h2>4. Teste Integrado</h2>
      <div class="test-step">
        <p>Executa o fluxo completo: criar → iniciar → completar → verificar</p>
        <button onclick="runFullTest()">▶️ Executar Teste Completo</button>
        <div id="result-full" class="result" style="display:none;"></div>
      </div>
    </div>
  </div>

  <!-- Scripts necessários para ActivityService funcionar standalone -->
  <script src="/js/supabase.js"></script>
  <script src="/js/system-config.js"></script>
  <script src="/js/smart-cache.js"></script>
  <script src="/js/services/ActivityService.js"></script>

  <script>
    let testActivityId = null;
    let testSubmissionId = null;

    function log(elementId, message, type = 'info') {
      const element = document.getElementById(elementId);
      element.style.display = 'block';
      const timestamp = new Date().toLocaleTimeString();
      const prefix = type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️';
      element.textContent += `[${timestamp}] ${prefix} ${message}\n`;
      element.scrollTop = element.scrollHeight;
    }

    function clearLog(elementId) {
      const element = document.getElementById(elementId);
      element.textContent = '';
      element.style.display = 'none';
    }

    async function testActivityServiceExists() {
      clearLog('result-service');

      if (typeof window.activityService === 'undefined') {
        log('result-service', 'ActivityService não encontrado! Verifique se o script está carregado.', 'error');
        return false;
      }

      log('result-service', 'ActivityService encontrado!', 'success');
      log('result-service', `Métodos disponíveis: ${Object.getOwnPropertyNames(Object.getPrototypeOf(window.activityService)).filter(m => m !== 'constructor').join(', ')}`);
      return true;
    }

    async function testActivityServiceInit() {
      clearLog('result-service');

      try {
        await window.activityService.init();
        log('result-service', 'IndexedDB inicializado com sucesso!', 'success');
        log('result-service', `Database: ${window.activityService.dbName}`);
        log('result-service', `Store: ${window.activityService.storeName}`);
        return true;
      } catch (error) {
        log('result-service', `Erro ao inicializar: ${error.message}`, 'error');
        return false;
      }
    }

    async function createTestActivity() {
      clearLog('result-lifecycle');

      testActivityId = `test-activity-${Date.now()}`;
      document.getElementById('test-activity-id').textContent = testActivityId;

      const testActivity = {
        id: testActivityId,
        title: 'Teste de Atividade',
        description: 'Atividade criada para teste do ciclo de vida',
        status: 'a_fazer',
        priority: 'alta',
        due_date: new Date().toISOString(),
        form_id: 'ecopontoForm',
        assignee_id: 'test-user',
        payload: { test: true },
        original_task: {
          id: testActivityId,
          titulo: 'Teste de Atividade',
          descricao: 'Atividade criada para teste',
          status: 'a_fazer',
          prioridade: 'alta',
          prazo: new Date().toISOString(),
          form_registry_id: 'ecopontoForm',
          atribuido_para: 'test-user'
        }
      };

      try {
        await window.activityService.init();
        await window.activityService.cacheActivities([testActivity]);

        log('result-lifecycle', `Atividade criada: ${testActivityId}`, 'success');
        log('result-lifecycle', `Status: ${testActivity.status}`);

        document.getElementById('btn-start').disabled = false;
        return true;
      } catch (error) {
        log('result-lifecycle', `Erro ao criar atividade: ${error.message}`, 'error');
        return false;
      }
    }

    async function startTestActivity() {
      clearLog('result-lifecycle');

      if (!testActivityId) {
        log('result-lifecycle', 'Nenhuma atividade de teste criada!', 'error');
        return false;
      }

      try {
        log('result-lifecycle', `Iniciando atividade ${testActivityId}...`);
        await window.activityService.startActivity(testActivityId);

        log('result-lifecycle', 'Atividade iniciada com sucesso!', 'success');
        log('result-lifecycle', 'Status atualizado para: em_progresso');

        document.getElementById('btn-complete').disabled = false;
        return true;
      } catch (error) {
        log('result-lifecycle', `Erro ao iniciar atividade: ${error.message}`, 'error');
        return false;
      }
    }

    async function completeTestActivity() {
      clearLog('result-lifecycle');

      if (!testActivityId) {
        log('result-lifecycle', 'Nenhuma atividade de teste criada!', 'error');
        return false;
      }

      testSubmissionId = `test-submission-${Date.now()}`;

      try {
        log('result-lifecycle', `Completando atividade ${testActivityId}...`);
        log('result-lifecycle', `Submission ID: ${testSubmissionId}`);

        await window.activityService.completeActivity(testActivityId, testSubmissionId);

        log('result-lifecycle', 'Atividade completada com sucesso!', 'success');
        log('result-lifecycle', '✓ Removida do cache local');
        log('result-lifecycle', '✓ Update enviado para inbox (se online)');

        return true;
      } catch (error) {
        log('result-lifecycle', `Erro ao completar atividade: ${error.message}`, 'error');
        return false;
      }
    }

    async function checkActivityStatus() {
      clearLog('result-lifecycle');

      if (!testActivityId) {
        log('result-lifecycle', 'Nenhuma atividade de teste criada!', 'error');
        return;
      }

      try {
        await window.activityService.init();
        const db = window.activityService.db;
        const transaction = db.transaction([window.activityService.storeName], 'readonly');
        const store = transaction.objectStore(window.activityService.storeName);

        const request = store.get(testActivityId);

        request.onsuccess = () => {
          if (request.result) {
            log('result-lifecycle', `Atividade encontrada no cache!`, 'info');
            log('result-lifecycle', `Status: ${request.result.status}`);
            log('result-lifecycle', JSON.stringify(request.result, null, 2));
          } else {
            log('result-lifecycle', 'Atividade NÃO encontrada no cache (provavelmente foi completada e removida)', 'success');
          }
        };

        request.onerror = () => {
          log('result-lifecycle', `Erro ao verificar status: ${request.error}`, 'error');
        };
      } catch (error) {
        log('result-lifecycle', `Erro: ${error.message}`, 'error');
      }
    }

    async function listLocalActivities() {
      clearLog('result-cache');

      try {
        const activities = await window.activityService.getLocalActivities();

        log('result-cache', `Total de atividades em cache: ${activities.length}`, 'info');

        if (activities.length === 0) {
          log('result-cache', 'Cache vazio (nenhuma atividade pendente)', 'success');
        } else {
          activities.forEach((activity, index) => {
            log('result-cache', `\n--- Atividade ${index + 1} ---`);
            log('result-cache', `ID: ${activity.id}`);
            log('result-cache', `Título: ${activity.title}`);
            log('result-cache', `Status: ${activity.status}`);
            log('result-cache', `Prioridade: ${activity.priority}`);
          });
        }
      } catch (error) {
        log('result-cache', `Erro ao listar atividades: ${error.message}`, 'error');
      }
    }

    async function clearLocalCache() {
      clearLog('result-cache');

      if (!confirm('Tem certeza que deseja limpar o cache de atividades?')) {
        return;
      }

      try {
        await window.activityService.init();
        const db = window.activityService.db;
        const transaction = db.transaction([window.activityService.storeName], 'readwrite');
        const store = transaction.objectStore(window.activityService.storeName);

        const request = store.clear();

        request.onsuccess = () => {
          log('result-cache', 'Cache limpo com sucesso!', 'success');
        };

        request.onerror = () => {
          log('result-cache', `Erro ao limpar cache: ${request.error}`, 'error');
        };
      } catch (error) {
        log('result-cache', `Erro: ${error.message}`, 'error');
      }
    }

    async function runFullTest() {
      clearLog('result-full');

      log('result-full', '========== INICIANDO TESTE COMPLETO ==========\n');

      // Passo 1: Verificar serviço
      log('result-full', 'Passo 1: Verificando ActivityService...');
      if (!await testActivityServiceExists()) {
        log('result-full', 'FALHA: ActivityService não disponível', 'error');
        return;
      }
      await new Promise(resolve => setTimeout(resolve, 500));

      // Passo 2: Inicializar
      log('result-full', '\nPasso 2: Inicializando DB...');
      if (!await testActivityServiceInit()) {
        log('result-full', 'FALHA: Erro na inicialização', 'error');
        return;
      }
      await new Promise(resolve => setTimeout(resolve, 500));

      // Passo 3: Criar atividade
      log('result-full', '\nPasso 3: Criando atividade de teste...');
      if (!await createTestActivity()) {
        log('result-full', 'FALHA: Erro ao criar atividade', 'error');
        return;
      }
      log('result-full', `✓ Atividade criada: ${testActivityId}`);
      await new Promise(resolve => setTimeout(resolve, 500));

      // Passo 4: Verificar cache (deve ter 1)
      log('result-full', '\nPasso 4: Verificando cache (deve ter 1 atividade)...');
      const activitiesBefore = await window.activityService.getLocalActivities();
      log('result-full', `✓ Atividades em cache: ${activitiesBefore.length}`);
      if (activitiesBefore.length !== 1) {
        log('result-full', 'AVISO: Cache não contém exatamente 1 atividade', 'error');
      }
      await new Promise(resolve => setTimeout(resolve, 500));

      // Passo 5: Iniciar atividade
      log('result-full', '\nPasso 5: Iniciando atividade...');
      if (!await startTestActivity()) {
        log('result-full', 'FALHA: Erro ao iniciar atividade', 'error');
        return;
      }
      log('result-full', '✓ Atividade iniciada (status: em_progresso)');
      await new Promise(resolve => setTimeout(resolve, 500));

      // Passo 6: Completar atividade
      log('result-full', '\nPasso 6: Completando atividade...');
      if (!await completeTestActivity()) {
        log('result-full', 'FALHA: Erro ao completar atividade', 'error');
        return;
      }
      log('result-full', `✓ Atividade completada (submission: ${testSubmissionId})`);
      await new Promise(resolve => setTimeout(resolve, 500));

      // Passo 7: Verificar cache (deve estar vazio)
      log('result-full', '\nPasso 7: Verificando cache (deve estar vazio)...');
      const activitiesAfter = await window.activityService.getLocalActivities();
      log('result-full', `✓ Atividades em cache: ${activitiesAfter.length}`);

      if (activitiesAfter.length === 0) {
        log('result-full', '\n========== ✅ TESTE COMPLETO PASSOU! ==========', 'success');
        log('result-full', '\nCiclo de vida funcionando corretamente:', 'success');
        log('result-full', '  1. Atividade criada ✓');
        log('result-full', '  2. Atividade iniciada ✓');
        log('result-full', '  3. Atividade completada ✓');
        log('result-full', '  4. Cache limpo automaticamente ✓');
      } else {
        log('result-full', '\n========== ❌ TESTE FALHOU ==========', 'error');
        log('result-full', 'Atividade não foi removida do cache após conclusão!', 'error');
      }
    }

    // Auto-init on load
    window.addEventListener('load', () => {
      console.log('🧪 Página de teste carregada');
      if (typeof window.activityService === 'undefined') {
        alert('⚠️ AVISO: ActivityService não está carregado!\n\nEsta página de teste precisa ser aberta no contexto do app principal.\n\nVá para www/index.html primeiro para carregar todos os serviços.');
      }
    });
  </script>
</body>

</html>
